<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Data Store">
    <title>Data Store - Instant Bundles</title>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        h2 { color: #1a73e8; text-align: center; margin-top: 10px; }
        .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 20px; }
        
        /* Grid for bundles */
        .bundle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .bundle-card { border: 2px solid #f0f0f0; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .bundle-card:active { transform: scale(0.95); background: #f0f7ff; border-color: #1a73e8; }
        .bundle-card strong { display: block; font-size: 20px; color: #333; }
        .bundle-card span { font-size: 14px; color: #1a73e8; font-weight: bold; }

        /* Order Form Area */
        .form-section { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #eee; display: none; }
        .form-section.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        label { font-weight: bold; font-size: 14px; color: #444; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 18px; outline: none; }
        input:focus { border-color: #1a73e8; }
        
        .pay-btn { width: 100%; background: #28a745; color: white; border: none; padding: 18px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .pay-btn:active { background: #218838; }
        
        .footer-note { font-size: 11px; color: #aaa; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Data Store</h2>
    <p class="subtitle">Select a bundle to continue</p>

    <div class="bundle-grid" id="bundleContainer">
        </div>

    <div class="form-section" id="orderForm">
        <h3 id="selectedPlanTitle" style="margin-top:0;">Confirm Order</h3>
        <label>Enter Recipient Phone Number:</label>
        <input type="tel" id="recipientPhone" placeholder="024XXXXXXX" maxlength="10">
        <button class="pay-btn" onclick="handlePayment()">Pay & Get Data</button>
        <p class="footer-note">Payment goes to: 0248745662</p>
    </div>
</div>

<script>
    const momoNumber = "0248745662";
    let currentOrder = { gb: 0, price: 0 };

    // 1. Logic: Generate bundles 1-10 with your pricing (5 per GB + 1 Cedi)
    const container = document.getElementById('bundleContainer');
    for (let gb = 1; gb <= 10; gb++) {
        let price = (gb * 5) + 1;
        const card = document.createElement('div');
        card.className = 'bundle-card';
        card.innerHTML = `<strong>${gb}GB</strong><span>${price} GHS</span>`;
        card.onclick = () => {
            currentOrder = { gb, price };
            document.getElementById('selectedPlanTitle').innerText = `Buy ${gb}GB for ${price} GHS`;
            document.getElementById('orderForm').classList.add('active');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };
        container.appendChild(card);
    }

    // 2. Logic: The Algorithm for Payment & Notification
    function handlePayment() {
        const targetNumber = document.getElementById('recipientPhone').value;
        
        if (targetNumber.length < 10) {
            alert("Please enter a valid 10-digit phone number.");
            return;
        }

        // Create the message for your WhatsApp
        const textMessage = `New Order!%0A---%0ABundle: ${currentOrder.gb}GB%0APrice: ${currentOrder.price} GHS%0ARecipient: ${targetNumber}`;
        const whatsappURL = `https://wa.me/233248745662?text=${textMessage}`;

        // Step 1: Tell user what is happening
        alert(`INSTRUCTIONS:\n1. Your dialer will open now.\n2. Pay ${currentOrder.price} GHS to ${momoNumber}.\n3. After paying, you'll be sent to WhatsApp to confirm your number.`);

        // Step 2: Open dialer
        window.location.href = "tel:" + momoNumber;

        // Step 3: Wait 4 seconds, then open WhatsApp so you get the "Backdoor" notification
        setTimeout(() => {
            window.location.href = whatsappURL;
        }, 4000);
    }
</script>

</body>
</html>
