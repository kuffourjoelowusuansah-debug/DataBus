<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Iconic Store</title>
    <script src="https://js.paystack.co/v2/inline.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --accent: #FF3B30; 
            --accent-grad: linear-gradient(135deg, #FF3B30 0%, #FF9500 100%);
            --mtn-blue: #003399;
            --glass: rgba(255, 255, 255, 0.05); --success: #25D366;
            --bundle-bg: #1f1f1f; --bundle-border: #333333;
        }

        .light-mode {
            --bg: #f8f9fa; --card: #ffffff; --text: #121212; --glass: rgba(0, 0, 0, 0.05);
            --bundle-bg: #ffffff; --bundle-border: #e0e0e0;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            transition: 0.3s;
        }

        #themeModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 50000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-weight: 900; letter-spacing: -1.5px; font-size: 22px; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .app-container { background: var(--card); width: 100%; max-width: 400px; border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); padding: 25px; box-sizing: border-box; border: 1px solid var(--glass); }
        .tagline { text-align: center; font-weight: 800; font-size: 28px; margin-bottom: 20px; line-height: 1.2; }

        .features-box { background: #fff; border-radius: 25px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .feature-item { text-align: center; color: #1a365d; }
        .feature-item .icon-wrap { color: #FF3B30; margin-bottom: 8px; }
        .feature-item h4 { margin: 0; font-size: 13px; font-weight: 800; color: #2d3748; }
        .feature-item p { margin: 4px 0 0; font-size: 10px; color: #718096; line-height: 1.4; }
        
        .updates-pill { display: flex; align-items: center; justify-content: space-between; background: #ffffff; color: #000; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: 700; margin-bottom: 25px; border: 1px solid #eee; }

        .tabs-container { display: flex; width: 100%; background: var(--glass); padding: 5px; border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--glass); }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 15px; background: none; color: var(--text); font-weight: 800; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .tab-btn span { font-size: 9px; opacity: 0.7; font-weight: 400; }
        .tab-btn.active { background: var(--accent-grad); color: #fff; }
        .bundle-section { display: none; }
        .bundle-section.active { display: block; }

        /* DATA PLATE DESIGN (MATCHING REFERENCE) */
        .bundle-grid { display: flex; flex-direction: column; gap: 15px; }
        .bundle-card { 
            border: 1px solid var(--bundle-border); 
            padding: 22px; 
            border-radius: 24px; 
            background: var(--bundle-bg); 
            position: relative; 
            transition: 0.3s ease;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            cursor: pointer;
        }
        .bundle-card:hover { border-color: var(--accent); }
        .bundle-card.selected { border: 2px solid var(--accent); background: rgba(255, 59, 48, 0.05); }
        
        .plate-info h5 { margin: 0; font-size: 13px; font-weight: 800; opacity: 0.7; letter-spacing: 0.5px; }
        .plate-info h2 { margin: 6px 0; font-size: 34px; font-weight: 900; letter-spacing: -1px; }
        .plate-info p { margin: 0; font-size: 13px; opacity: 0.5; font-weight: 600; }
        .plate-price { font-size: 24px; font-weight: 900; color: var(--success); margin-top: 12px; display: block; }

        .plate-visuals { text-align: right; display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; height: 100%; }
        .expiry-tag { font-size: 10px; background: var(--glass); padding: 5px 12px; border-radius: 10px; font-weight: 700; margin-bottom: 12px; opacity: 0.8; }
        .net-icon-plate { width: 50px; height: 50px; border-radius: 14px; object-fit: cover; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .buy-pill { background: var(--accent-grad); color: white; border: none; padding: 10px 24px; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3); }

        .large-input { width: 100%; padding: 25px 15px; border-radius: 25px; border: 2px solid var(--accent); background: var(--glass); color: var(--text); font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .pay-btn { width: 100%; background: var(--accent-grad); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 20px rgba(255, 59, 48, 0.2); }

        #sideMenu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--card); z-index: 12000; transition: 0.4s ease; padding: 40px 20px; border-left: 1px solid var(--glass); }
        #sideMenu.active { right: 0; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 15px; background: var(--glass); display: flex; align-items: center; gap: 12px; cursor: pointer; font-weight: 600; }
        #workModal, #receiptPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 30000; display: none; flex-direction: column; padding: 25px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

<div id="themeModal">
    <h2 style="color:var(--accent)">Welcome to JoelData</h2>
    <p>Please choose a theme to start:</p>
    <button class="pay-btn" onclick="setTheme('dark')" style="margin-bottom:15px">DARK MODE</button>
    <button class="pay-btn" onclick="setTheme('light')" style="background:#fff; color:#000; box-shadow: none;">LIGHT MODE</button>
</div>

<div id="sideMenu">
    <h3 style="color: var(--accent)">JoelData Menu</h3>
    <div class="menu-item" onclick="openWorkModal()"><i data-lucide="briefcase"></i> Work With Us</div>
    <div class="menu-item" onclick="viewReceipt()"><i data-lucide="file-text"></i> Last Receipt</div>
    <div class="menu-item" onclick="toggleTheme(); toggleMenu();"><i data-lucide="refresh-cw"></i> Toggle Theme</div>
    <div class="menu-item" onclick="toggleMenu()" style="margin-top:20px; background:#ef4444; color:#fff"><i data-lucide="x"></i> Close</div>
</div>

<div class="header">
    <div class="logo">JOELDATA.</div>
    <button class="pay-btn" onclick="toggleMenu()" style="width:auto; padding:8px 15px; font-size:12px"><i data-lucide="menu"></i> MENU</button>
</div>

<div class="app-container">
    <div class="tagline">Stay online<br>Everytime</div>

    <div class="features-box">
        <div class="feature-item"><div class="icon-wrap"><i data-lucide="truck"></i></div><h4>Fast Delivery</h4><p>Instant Activation.</p></div>
        <div class="feature-item"><div class="icon-wrap"><i data-lucide="shield-check"></i></div><h4>Secured</h4><p>100% Encrypted.</p></div>
    </div>

    <a href="https://whatsapp.com/channel/0029Vb80VO3Bfxnx4pIYb11c" class="updates-pill" target="_blank">
        <div style="display:flex; align-items:center; gap:10px"><i data-lucide="megaphone" size="18" style="color:#ef4444;"></i><span>Follow <b>JOELDATA Updates</b></span></div>
        <div><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="height:24px;" alt="WA"></div>
    </a>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('mtn')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/MTN_Logo.svg" style="height:22px; margin-bottom:5px;" alt="MTN">
            MTN<span>Non-Expiry</span>
        </button>
        <button class="tab-btn" onclick="switchTab('at')">
            <img src="https://i.ibb.co/L6vV8yH/at-logo.png" style="height:22px; margin-bottom:5px;" alt="AT">
            AT<span>30 Days</span>
        </button>
    </div>

    <div id="mtnSection" class="bundle-section active"><div class="bundle-grid" id="mtnGrid"></div></div>
    <div id="atSection" class="bundle-section"><div class="bundle-grid" id="atGrid"></div></div>

    <div id="orderForm" style="display:none; margin-top:25px;">
        <div style="text-align:center; margin-bottom:15px;">
            <strong id="selectedInfo" style="color:var(--accent); font-size:18px;"></strong>
        </div>
        <input type="tel" id="recipientPhone" class="large-input" placeholder="02XXXXXXXX" maxlength="10">
        <div style="font-size:11px; margin-bottom:15px; text-align:center;">
            <input type="checkbox" id="termsCheck"> I agree to the Terms & Privacy Policy
        </div>
        <button class="pay-btn" onclick="handlePaystackPayment()" id="mainBtn"><i data-lucide="credit-card"></i> <span>PAY SECURELY NOW</span></button>
    </div>
</div>

<script>
    let currentNet = "MTN"; let selectedGB = 0; let selectedPrice = 0; let selRole = "";
    const PAYSTACK_PUBLIC_KEY = 'pk_live_90305707d30b6282979eac837bbbc9509da579af';

    const mtnData = [
        {g:"1GB",p:5},{g:"2GB",p:10},{g:"3GB",p:15},{g:"4GB",p:20},{g:"5GB",p:25},
        {g:"6GB",p:30},{g:"8GB",p:40},{g:"10GB",p:50},{g:"12GB",p:55},{g:"15GB",p:65},
        {g:"20GB",p:85},{g:"25GB",p:105},{g:"30GB",p:130},{g:"40GB",p:165},{g:"50GB",p:200}
    ];

    const atData = [
        {g:"1GB",p:4.5},{g:"2GB",p:9},{g:"3GB",p:14},{g:"4GB",p:18},{g:"5GB",p:20.5},
        {g:"6GB",p:25},{g:"8GB",p:32},{g:"10GB",p:40},{g:"12GB",p:50},{g:"15GB",p:60},
        {g:"25GB",p:100},{g:"30GB",p:125},{g:"40GB",p:160},{g:"50GB",p:205}
    ];

    window.onload = () => { 
        renderGrid('mtnGrid', mtnData, 'MTN', 'Non Expiry', 'https://upload.wikimedia.org/wikipedia/commons/a/af/MTN_Logo.svg');
        renderGrid('atGrid', atData, 'AT', '30 Days', 'https://i.ibb.co/L6vV8yH/at-logo.png');
        if(!localStorage.getItem('theme')) document.getElementById('themeModal').style.display='flex'; 
        else setTheme(localStorage.getItem('theme')); 
        lucide.createIcons();
    };

    function renderGrid(containerId, data, netName, expiry, logo) {
        const container = document.getElementById(containerId);
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'bundle-card';
            card.innerHTML = `
                <div class="plate-info">
                    <h5>${netName}</h5>
                    <h2>${item.g}</h2>
                    <p>Data Bundle</p>
                    <span class="plate-price">₵${item.p.toFixed(2)}</span>
                </div>
                <div class="plate-visuals">
                    <span class="expiry-tag">${expiry}</span>
                    <img src="${logo}" class="net-icon-plate">
                    <button class="buy-pill"><i data-lucide="shopping-cart" size="16"></i> Buy</button>
                </div>
            `;
            card.onclick = () => {
                document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedGB = item.g; selectedPrice = item.p;
                document.getElementById('orderForm').style.display = 'block';
                document.getElementById('selectedInfo').innerText = `Buying ${item.g} ${currentNet}`;
                window.scrollTo({ top: document.getElementById('orderForm').offsetTop, behavior: 'smooth' });
            };
            container.appendChild(card);
        });
    }

    function switchTab(net) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.bundle-section').forEach(s => s.classList.remove('active'));
        if(net === 'mtn') {
            document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
            document.getElementById('mtnSection').classList.add('active');
            currentNet = "MTN";
        } else {
            document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
            document.getElementById('atSection').classList.add('active');
            currentNet = "AT";
        }
    }

    function handlePaystackPayment() {
        const phone = document.getElementById('recipientPhone').value;
        if(!document.getElementById('termsCheck').checked) return alert("Please accept the terms.");
        if(phone.length < 10) return alert("Enter a valid 10-digit number.");
        let fee = selectedPrice < 30 ? 0.30 : 0.90;
        let finalAmount = selectedPrice + fee;
        const paystack = new PaystackPop();
        paystack.newTransaction({
            key: PAYSTACK_PUBLIC_KEY,
            email: 'sales@joeldata.com', 
            amount: Math.round(finalAmount * 100), 
            currency: 'GHS',
            onSuccess: (t) => {
                const order = `JOELDATA ORDER: ${selectedGB} ${currentNet} to ${phone}`;
                window.location.href=`https://wa.me/233248745662?text=${encodeURIComponent(order)}`;
            }
        });
    }

    function setTheme(m) { document.body.className = m === 'light' ? 'light-mode' : ''; localStorage.setItem('theme', m); document.getElementById('themeModal').style.display='none'; }
    function toggleTheme() { setTheme(document.body.classList.contains('light-mode') ? 'dark' : 'light'); }
    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
</script>
</body>
</html>
