<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Simple Store</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --accent: #FFCC00; --mtn-blue: #003399;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .app-container { 
            background: var(--card); width: 100%; max-width: 400px; 
            border-radius: 30px; padding: 25px; box-sizing: border-box; 
            border: 1px solid var(--glass);
        }

        .logo { font-weight: 900; font-size: 24px; color: var(--accent); margin-bottom: 20px; text-align: center; width: 100%; }

        /* Grid for selection */
        .bundle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .bundle-card { 
            border: 1px solid var(--glass); padding: 15px; border-radius: 20px; 
            text-align: center; cursor: pointer; background: var(--glass); transition: 0.2s;
        }
        .bundle-card.selected { border: 2px solid var(--accent); background: var(--accent); color: #000; }

        /* Order Form */
        #orderForm { display: none; margin-top: 25px; }
        #orderForm.active { display: block; }

        .copy-section { background: var(--mtn-blue); padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .copy-btn { background: #fff; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--glass); background: #222; color: #fff; font-size: 18px; text-align: center; box-sizing: border-box; margin-bottom: 15px; }
        
        .action-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="logo">JOELDATA.</div>

<div class="app-container">
    <div class="bundle-grid" id="bundleGrid"></div>

    <div id="orderForm">
        <div class="copy-section">
            <span style="font-size: 12px; opacity: 0.8;">TRANSFER TO:</span><br>
            <strong style="font-size: 20px;">0248745662</strong><br>
            <button class="copy-btn" onclick="copyNum()">COPY NUMBER</button>
        </div>

        <input type="tel" id="userPhone" placeholder="Recipient Number (024...)" maxlength="10">
        <button class="action-btn" onclick="sendOrder()">CONFIRM ORDER</button>
    </div>
</div>

<script>
    const myNumber = "0248745662";
    let selectedGB = "";

    // Load bundles
    const grid = document.getElementById('bundleGrid');
    for (let i = 1; i <= 10; i++) {
        const div = document.createElement('div');
        div.className = 'bundle-card';
        div.innerHTML = `<strong>${i}GB</strong><br><small>${(i*5)+1} GHS</small>`;
        div.onclick = () => {
            document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
            div.classList.add('selected');
            selectedGB = i;
            document.getElementById('orderForm').classList.add('active');
        };
        grid.appendChild(div);
    }

    function copyNum() {
        navigator.clipboard.writeText(myNumber);
        alert("Number Copied!");
    }

    function sendOrder() {
        const recipient = document.getElementById('userPhone').value;
        if(recipient.length < 10) return alert("Enter valid number");

        // Dial USSD immediately
        window.location.href = "tel:*170#";

        // Open WhatsApp with details
        setTimeout(() => {
            const msg = `New Order: ${selectedGB}GB for ${recipient}`;
            window.location.href = `https://wa.me/233248745662?text=${encodeURIComponent(msg)}`;
        }, 1500);
    }
</script>

</body>
</html>
