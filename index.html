<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBus | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Color Scheme Implementation */
        :root {
            --midnight-blue: #0f172a;
            --cyber-yellow: #facc15;
            --road-grey: #1e293b;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--midnight-blue); color: #f8fafc; }
        
        /* Glassmorphism for Dashboard elements */
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Role Specific Gradients */
        .passenger-grad { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); border-left: 4px solid #3b82f6; }
        .agent-grad { background: linear-gradient(135deg, #facc15 0%, #ca8a04 100%); color: #0f172a !important; }
        
        .quick-action-btn { background: #1e293b; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.05); }
        .quick-action-btn:hover { border-color: var(--cyber-yellow); transform: translateY(-2px); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative shadow-2xl">

    <header class="p-5 flex justify-between items-center bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-50">
        <button class="bg-slate-800/50 text-[10px] font-black px-4 py-2 rounded-xl border border-slate-700 flex items-center gap-2 tracking-widest text-yellow-400">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> DASHBOARD
        </button>

        <div class="flex flex-col items-center">
            <svg width="40" height="25" viewBox="0 0 120 60" fill="none">
                <path d="M10 50 H110 V30 C110 20 100 15 90 15 H75 M45 15 H15 C10 15 5 20 5 30 V45" stroke="#facc15" stroke-width="5" stroke-linecap="round"/>
                <path d="M50 20 C55 12 65 12 70 20" stroke="#facc15" stroke-width="4" stroke-linecap="round"/>
                <circle cx="60" cy="30" r="3" fill="#facc15"/>
                <circle cx="25" cy="50" r="7" fill="#facc15"/>
                <circle cx="95" cy="50" r="7" fill="#facc15"/>
            </svg>
            <span class="text-xs font-black italic tracking-tighter uppercase mt-1">Data<span class="text-yellow-400">Bus</span></span>
        </div>

        <button class="relative bg-slate-800/50 p-2 rounded-xl border border-slate-700">
            <i data-lucide="bell" class="w-5 h-5 text-slate-400"></i>
            <span class="absolute -top-1 -right-1 w-4 h-4 bg-yellow-400 text-[#0f172a] text-[9px] flex items-center justify-center rounded-full font-black">3</span>
        </button>
    </header>

    <main class="p-6 space-y-8">

        <div id="statusCard" class="passenger-grad rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-center">
                    <p id="greeting" class="text-xs font-bold uppercase tracking-[0.2em] opacity-70 text-slate-300">Good Morning, Passenger</p>
                    <span id="roleLabel" class="text-[9px] font-black px-2 py-1 bg-white/10 rounded-lg">STANDARD</span>
                </div>
                
                <p class="mt-8 text-[10px] font-black opacity-50 uppercase tracking-widest">Total History</p>
                <div class="flex items-baseline gap-2 mt-1">
                    <span class="text-sm font-bold opacity-60">GH₵</span>
                    <h1 id="balance" class="text-5xl font-black tracking-tighter">0.00</h1>
                </div>

                <div class="flex gap-3 mt-8">
                    <button class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-2xl text-[10px] font-black uppercase tracking-wider transition-all">
                        + Top-up
                    </button>
                    <button class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-2xl text-[10px] font-black uppercase tracking-wider transition-all">
                        History
                    </button>
                </div>
            </div>
            <i data-lucide="wifi" class="absolute -right-6 -bottom-6 w-32 h-32 opacity-5 rotate-12"></i>
        </div>

        <section>
            <div class="flex items-center gap-3 mb-6">
                <div class="h-[2px] flex-1 bg-slate-800"></div>
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Quick Routes</h3>
                <div class="h-[2px] flex-1 bg-slate-800"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="quick-action-btn p-6 rounded-[2rem] flex flex-col items-center gap-4 group">
                    <div class="bg-yellow-400/10 p-4 rounded-2xl group-hover:bg-yellow-400 group-hover:text-slate-900 transition-all">
                        <i data-lucide="zap" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-black uppercase tracking-widest">Buy Data</span>
                </div>

                <div class="quick-action-btn p-6 rounded-[2rem] flex flex-col items-center gap-4 group">
                    <div class="bg-blue-400/10 p-4 rounded-2xl group-hover:bg-blue-400 group-hover:text-slate-900 transition-all">
                        <i data-lucide="user-plus" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-black uppercase tracking-widest">Register</span>
                </div>

                <div class="quick-action-btn p-6 rounded-[2rem] flex flex-col items-center gap-4 group">
                    <div class="bg-green-400/10 p-4 rounded-2xl group-hover:bg-green-400 group-hover:text-slate-900 transition-all">
                        <i data-lucide="history" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-black uppercase tracking-widest">Orders</span>
                </div>

                <div class="quick-action-btn p-6 rounded-[2rem] flex flex-col items-center gap-4 group">
                    <div class="bg-purple-400/10 p-4 rounded-2xl group-hover:bg-purple-400 group-hover:text-slate-900 transition-all">
                        <i data-lucide="help-circle" class="w-6 h-6"></i>
                    </div>
                    <span class="text-[11px] font-black uppercase tracking-widest">Support</span>
                </div>
            </div>
        </section>

        <div class="text-center pb-10">
            <button onclick="demoRoleSwitch()" class="text-[9px] text-slate-600 hover:text-yellow-400 transition-colors uppercase font-bold tracking-widest border border-slate-800 px-4 py-2 rounded-full">
                Simulate Status: <span id="demoStatus">Passenger</span>
            </button>
        </div>

    </main>

    <script>
        lucide.createIcons();

        let isAgent = false;

        function demoRoleSwitch() {
            isAgent = !isAgent;
            const card = document.getElementById('statusCard');
            const greet = document.getElementById('greeting');
            const demoText = document.getElementById('demoStatus');
            const roleLabel = document.getElementById('roleLabel');

            if (isAgent) {
                card.className = "agent-grad rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden";
                greet.innerText = "Welcome Back, Agent";
                greet.className = "text-xs font-bold uppercase tracking-[0.2em] text-slate-900 opacity-70";
                roleLabel.innerText = "PARTNER";
                roleLabel.className = "text-[9px] font-black px-2 py-1 bg-black/10 rounded-lg";
                demoText.innerText = "Agent";
            } else {
                card.className = "passenger-grad rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden";
                greet.innerText = "Good Morning, Passenger";
                greet.className = "text-xs font-bold uppercase tracking-[0.2em] opacity-70 text-slate-300";
                roleLabel.innerText = "STANDARD";
                roleLabel.className = "text-[9px] font-black px-2 py-1 bg-white/10 rounded-lg";
                demoText.innerText = "Passenger";
            }
        }
    </script>
</body>
</html>
