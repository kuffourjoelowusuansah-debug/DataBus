<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataBus | High-Speed Data Transit</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Paystack -->
<script src="https://js.paystack.co/v2/inline.js"></script>

<!-- UI -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
--bg-deep: #020617;
--cyber-yellow: #facc15;
--pure-white: #ffffff;
}
body {
font-family: 'Plus Jakarta Sans', sans-serif;
background-color: var(--bg-deep);
color: var(--pure-white);
}

/* KEEP ALL YOUR ORIGINAL STYLES */
.status-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(255,255,255,0.1); }
.feature-card,.quick-action,.ticket-tab,.bundle-card,.inbox-card { background:#0f172a;border:1px solid #1e293b;transition:.2s; }
.quick-action:active,.ticket-tab:active { transform:scale(.96); border-color:var(--cyber-yellow); }

.status-in { background:#064e3b;color:#34d399;border:1px solid #059669; }
.status-out { background:#450a0a;color:#f87171;border:1px solid #dc2626; }

.bundle-header-mtn { background:var(--cyber-yellow);color:#000;border-radius:2rem 2rem 0 0; }
.bundle-header-at { background:#003366;color:#fff;border-radius:2rem 2rem 0 0; }
.bundle-header-telecel { background:#dc2626;color:#fff;border-radius:2rem 2rem 0 0; }

.hidden-view { display:none !important; }
.text-dim { color:#94a3b8;font-weight:500; }

.checkout-receipt { background:#0f172a;border:1px solid #1e293b;border-radius:2.5rem;position:relative;overflow:hidden; }
.checkout-receipt::before { content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--cyber-yellow); }

.pulse-green { animation:pulse-green 2s infinite; }
@keyframes pulse-green { 0%{opacity:1} 50%{opacity:.4} 100%{opacity:1} }
</style>
</head>

<body class="max-w-md mx-auto min-h-screen border-x border-slate-900 shadow-2xl relative">

<!-- KEEP ALL YOUR HTML EXACTLY AS IT IS -->
<!-- (No UI removed, no sections deleted) -->

<script>
/* FIREBASE INIT */
const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "joeldata-25d06.firebaseapp.com",
projectId: "joeldata-25d06",
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* GLOBAL STATE */
let currentNet="MTN";
let selG="", selP=0, activeRef="";

/* ICON REFRESH */
const refreshIcons = () => lucide.createIcons();

/* GREETING */
function getGreeting(){
const h=new Date().getHours();
return h<12?"Good Morning":h<17?"Good Afternoon":"Good Evening";
}

/* VIEW HANDLER (optimized) */
function hideAll(){
document.querySelectorAll('[id$="View"]').forEach(v=>v.classList.add('hidden-view'));
}

/* NAVIGATION */
function showHome(){hideAll();homeView.classList.remove('hidden-view');}
function showTickets(){hideAll();ticketsView.classList.remove('hidden-view');}
function showInbox(){hideAll();inboxView.classList.remove('hidden-view');}
function showHistory(){hideAll();historyView.classList.remove('hidden-view');renderHistory();}

/* CHECKOUT */
function openCheckout(gb,price){
hideAll();
selG=gb;
selP=parseFloat(price);

activeRef="DB-"+Math.floor(100000+Math.random()*900000);

const fee=selP<30?0.3:0.9;
const total=(selP+fee).toFixed(2);

checkBundle.innerText=gb;
checkNet.innerText=currentNet;
checkRef.innerText=activeRef;
checkPrice.innerText=`₵ ${selP.toFixed(2)}`;
checkFee.innerText=`₵ ${fee.toFixed(2)}`;
checkTotal.innerText=`₵ ${total}`;

checkoutView.classList.remove('hidden-view');
}

/* AUTH */
auth.onAuthStateChanged(async user=>{
const greeting=getGreeting();

if(user){
authBtn.innerHTML=`LOGOUT`;
const name=(user.displayName||"Passenger").split(" ")[0];
userName.innerText=`${greeting}, ${name}`;
buyerEmail.value=user.email||"";

let total=0;
const snap=await db.collection('orders').where('email','==',user.email).get();
snap.forEach(doc=>total+=parseFloat(doc.data().amount||0));
totalSpent.innerText=total.toFixed(2);

}else{
authBtn.innerHTML=`LOGIN`;
userName.innerText=`${greeting}, Passenger`;
totalSpent.innerText="0.00";
}
});

/* LOGIN BUTTON */
function handleAuthClick(){
auth.currentUser ? auth.signOut() :
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

/* PAYMENT (improved validation) */
function handlePayment(){
const phone=recipientPhone.value.trim();
const email=buyerEmail.value.trim();

if(!/^0\d{9}$/.test(phone)) return alert("Enter valid Ghana number");
if(!email.includes("@")) return alert("Enter valid email");

const fee=selP<30?0.3:0.9;

const handler=PaystackPop.setup({
key:'pk_live_...',
email,
amount:Math.round((selP+fee)*100),
currency:'GHS',
ref:activeRef,

callback:(res)=>{
const now=new Date();

if(auth.currentUser){
db.collection('orders').add({
email:auth.currentUser.email,
phone,
amount:selP,
bundle:`${selG} ${currentNet}`,
ref:res.reference,
date:now.toLocaleDateString(),
time:now.toLocaleTimeString(),
timestamp:firebase.firestore.FieldValue.serverTimestamp()
});
}

window.location.href=`https://wa.me/233248745662?text=ORDER ${selG} ${currentNet} ${phone}`;
}
});

handler.openIframe();
}

/* PASSENGER COUNTER */
setInterval(()=>{
const el=document.getElementById('passengerCount');
if(!el) return;
let n=parseInt(el.innerText)||40;
n+=Math.floor(Math.random()*5)-2;
if(n<30)n=35;if(n>99)n=90;
el.innerText=n;
},3000);

refreshIcons();
</script>

</body>
</html>
