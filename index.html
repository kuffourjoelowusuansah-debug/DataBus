<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Iconic Store</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://js.paystack.co/v2/inline.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --accent: #FF3B30; 
            --accent-grad: linear-gradient(135deg, #FF3B30 0%, #FF9500 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --mtn-grad: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
            --at-grad: linear-gradient(135deg, #33C1FF 0%, #4B0082 100%);
        }
        .light-mode { --bg: #f8f9fa; --card: #ffffff; --text: #121212; --glass: rgba(0, 0, 0, 0.05); }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* HEADER & LOGO */
        .header { width: 100%; max-width: 1200px; padding: 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .logo { font-weight: 900; letter-spacing: -1.5px; font-size: 26px; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* MENU FIX: SCROLLABLE + CLOSE BUTTON */
        #sideMenu { 
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%; 
            background: var(--card); z-index: 50000; transition: 0.4s; 
            padding: 20px; border-left: 2px solid var(--accent);
            overflow-y: auto; display: flex; flex-direction: column;
        }
        #sideMenu.active { right: 0; }
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .menu-item { padding: 18px; margin-bottom: 12px; border-radius: 15px; background: var(--glass); cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 700; }

        /* BUNDLE CARDS (RESTORED ICONIC LOOK) */
        .app-container { width: 100%; max-width: 1200px; padding: 0 25px 50px; box-sizing: border-box; }
        .bundle-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; width: 100%; }
        .bundle-card { border-radius: 25px; padding: 25px; display: flex; flex-direction: column; gap: 15px; cursor: pointer; transition: 0.3s ease; color: white; }
        #mtnGrid .bundle-card { background: var(--mtn-grad); }
        #atGrid .bundle-card { background: var(--at-grad); }
        .plate-header { display: flex; justify-content: space-between; align-items: center; }
        .plate-amt { font-size: 48px; font-weight: 900; }
        .plate-logo { width: 50px; height: 50px; border-radius: 12px; background: white; padding: 4px; object-fit: contain; }
        .plate-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 15px; font-size: 12px; }
        .plate-buy-btn { width: 100%; background: #000; color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; }

        /* TABS */
        .tabs-container { display: inline-flex; background: var(--glass); padding: 6px; border-radius: 20px; margin-bottom: 30px; }
        .tab-btn { padding: 12px 30px; border: none; border-radius: 15px; background: none; color: var(--text); font-weight: 800; cursor: pointer; }
        .tab-btn.active { background: var(--accent-grad); color: #fff; }

        /* MODALS & TOAST */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--accent); width: 100%; max-width: 450px; }
        .purchase-toast { position: fixed; bottom: 20px; left: 20px; background: var(--card); border: 1px solid var(--accent); padding: 12px 20px; border-radius: 15px; display: flex; align-items: center; gap: 12px; z-index: 999999; transform: translateY(200%); transition: 0.5s; }
        .purchase-toast.show { transform: translateY(0); }
        
        #orderForm { max-width: 500px; margin: 40px auto; background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--accent); display: none; }
        .large-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--accent); background: var(--glass); color: var(--text); margin-bottom: 15px; box-sizing: border-box; }
        .pay-btn { width: 100%; background: var(--accent-grad); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div id="toast" class="purchase-toast">
    <img id="toastLogo" src="" style="width:30px; background:white; border-radius:5px; padding:2px;">
    <div id="toastMsg" style="font-size:12px; font-weight:600;"></div>
</div>

<div id="sideMenu">
    <div class="menu-header">
        <h3 style="color:var(--accent); margin:0;">JOELDATA</h3>
        <button onclick="toggleMenu()" style="background:none; border:none; color:white;"><i data-lucide="x"></i></button>
    </div>
    <div class="menu-item" id="authBtn" onclick="handleAuthClick()"><i data-lucide="user"></i> Sign In</div>
    <div class="menu-item" id="profileBtn" onclick="showModal('profile')" style="display:none;"><i data-lucide="layout-dashboard"></i> My Dashboard</div>
    <div class="menu-item" onclick="showModal('work')"><i data-lucide="briefcase"></i> Work With Us</div>
    <div class="menu-item" onclick="showModal('help')"><i data-lucide="help-circle"></i> How to Buy</div>
    <div class="menu-item" onclick="toggleTheme()"><i data-lucide="refresh-cw"></i> Change Theme</div>
    <button class="pay-btn" onclick="toggleMenu()" style="margin-top:20px; background:#ef4444; font-size:14px;">CLOSE</button>
</div>

<div id="genericModal" class="modal">
    <div class="modal-content">
        <div id="modalBody"></div>
        <button class="pay-btn" style="margin-top:20px; background:#333;" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<header class="header">
    <div class="logo">JOELDATA.</div>
    <button onclick="toggleMenu()" style="background:var(--accent-grad); border:none; color:white; padding:10px 15px; border-radius:10px; font-weight:bold; cursor:pointer;">MENU</button>
</header>

<main class="app-container">
    <div style="text-align: center;">
        <div class="tabs-container">
            <button id="mtnTab" class="tab-btn active" onclick="switchTab('mtn')">MTN Non-Expiry</button>
            <button id="atTab" class="tab-btn" onclick="switchTab('at')">AT GH 30 Days</button>
        </div>
    </div>

    <div id="mtnGrid" class="bundle-grid"></div>
    <div id="atGrid" class="bundle-grid" style="display:none;"></div>

    <div id="orderForm">
        <h2 id="orderLabel" style="text-align:center; color:var(--accent); margin-top:0;"></h2>
        <input type="tel" id="recipientPhone" class="large-input" placeholder="Recipient Phone (02XXXXXXXX)" maxlength="10">
        <input type="email" id="buyerEmail" class="large-input" placeholder="Your Email">
        <button class="pay-btn" onclick="handlePayment()">PAY NOW</button>
    </div>
</main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCqg3E9tuKRcEnq2DdP6FjtG0LqnAjCHfM",
        authDomain: "joeldata-25d06.firebaseapp.com",
        projectId: "joeldata-25d06",
        storageBucket: "joeldata-25d06.firebasestorage.app",
        messagingSenderId: "555857869458",
        appId: "1:555857869458:web:db96a97fca5983b142044b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const mtnLogo = 'https://upload.wikimedia.org/wikipedia/commons/a/af/MTN_Logo.svg';
    const atLogo = 'https://upload.wikimedia.org/wikipedia/commons/b/b8/Airtel-Tigo-Logo.png'; 

    const mtnData = [{g:"1 GB", p:5}, {g:"2 GB", p:10}, {g:"3 GB", p:15}, {g:"5 GB", p:25}, {g:"10 GB", p:50}, {g:"20 GB", p:85}, {g:"50 GB", p:200}];
    const atData = [{g:"1GB",p:4.5}, {g:"5GB",p:20}, {g:"10GB",p:40}, {g:"25GB",p:100}, {g:"50GB",p:205}];

    let selG = ""; let selP = 0; let currentNet = "MTN";

    window.onload = () => {
        renderGrid('mtnGrid', mtnData, 'MTN', 'Non Expiry', mtnLogo);
        renderGrid('atGrid', atData, 'AT', '30 Days', atLogo);
        lucide.createIcons();
        startPopups();
    };

    auth.onAuthStateChanged(user => {
        const pBtn = document.getElementById('profileBtn');
        if (user) {
            pBtn.style.display = 'flex';
            document.getElementById('authBtn').innerHTML = `<i data-lucide="log-out"></i> Log Out`;
            document.getElementById('buyerEmail').value = user.email;
        } else {
            pBtn.style.display = 'none';
            document.getElementById('authBtn').innerHTML = `<i data-lucide="user"></i> Sign In`;
        }
        lucide.createIcons();
    });

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
    function closeModal() { document.getElementById('genericModal').style.display = 'none'; }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    function handleAuthClick() { 
        if(auth.currentUser) { auth.signOut(); } else { showModal('login'); }
    }

    function renderGrid(id, data, net, exp, logo) {
        const grid = document.getElementById(id);
        data.forEach(d => {
            const card = document.createElement('div');
            card.className = 'bundle-card';
            card.innerHTML = `
                <div class="plate-header"><div class="plate-amt">${d.g}</div><img src="${logo}" class="plate-logo"></div>
                <div class="plate-details">
                    <div class="detail-item"><span>Price</span><br><b>₵${d.p}</b></div>
                    <div class="detail-item"><span>Duration</span><br><b>${exp}</b></div>
                </div>
                <button class="plate-buy-btn">BUY NOW</button>`;
            card.onclick = () => {
                selG = d.g; selP = d.p; currentNet = net;
                document.getElementById('orderForm').style.display = 'block';
                document.getElementById('orderLabel').innerText = `${net} ${d.g} Plan`;
                window.scrollTo({ top: document.getElementById('orderForm').offsetTop - 50, behavior: 'smooth' });
            };
            grid.appendChild(card);
        });
    }

    function switchTab(net) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(net === 'mtn') {
            document.getElementById('mtnTab').classList.add('active');
            document.getElementById('mtnGrid').style.display = 'grid';
            document.getElementById('atGrid').style.display = 'none';
        } else {
            document.getElementById('atTab').classList.add('active');
            document.getElementById('atGrid').style.display = 'grid';
            document.getElementById('mtnGrid').style.display = 'none';
        }
    }

    async function showModal(type) {
        const body = document.getElementById('modalBody');
        document.getElementById('genericModal').style.display = 'flex';
        if(type === 'profile') {
            body.innerHTML = '<h3>Reading Records...</h3>';
            const snap = await db.collection('orders').where('email', '==', auth.currentUser.email).get();
            let total = 0; let list = '';
            snap.forEach(d => { 
                total += d.data().amount; 
                list += `<div style="padding:10px; border-bottom:1px solid #333;">${d.data().bundle} - ₵${d.data().amount}</div>`; 
            });
            body.innerHTML = `<h2>Dashboard</h2><div style="background:var(--accent-grad); padding:20px; border-radius:15px; text-align:center;"><span>TOTAL SPENT</span><h1>₵${total.toFixed(2)}</h1></div><div style="max-height:150px; overflow-y:auto; margin-top:15px;">${list || 'No orders yet.'}</div>`;
        } else if(type === 'login') {
            body.innerHTML = `<h2>Sign In</h2><button class="pay-btn" onclick="auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(closeModal)">Google Sign In</button>`;
        } else if(type === 'work') {
            body.innerHTML = `<h2>Work With Us</h2><p>Contact Joel to become a vendor.</p><button class="pay-btn" onclick="window.location.href='https://wa.me/233248745662'">WhatsApp</button>`;
        }
        lucide.createIcons();
    }

    function handlePayment() {
        const phone = document.getElementById('recipientPhone').value;
        const email = document.getElementById('buyerEmail').value;
        if(phone.length < 10) return alert("Invalid Phone");
        const handler = PaystackPop.setup({
            key: 'pk_live_90305707d30b6282979eac837bbbc9509da579af',
            email: email, amount: Math.round(selP * 100), currency: 'GHS',
            callback: (res) => {
                db.collection('orders').add({ email: email, amount: selP, bundle: `${selG} ${currentNet}`, ref: res.reference, date: new Date().toLocaleDateString() });
                window.location.href = `https://wa.me/233248745662?text=Order for ${selG} ${currentNet} to ${phone}`;
            }
        });
        handler.openIframe();
    }

    function startPopups() {
        const locs = ["Accra", "Kumasi", "Sunyani", "Ho"];
        setInterval(() => {
            const l = locs[Math.floor(Math.random()*locs.length)];
            document.getElementById('toastLogo').src = Math.random() > 0.5 ? mtnLogo : atLogo;
            document.getElementById('toastMsg').innerHTML = `Someone in <b>${l}</b> just bought Data!`;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 4000);
        }, 8000);
    }
</script>
</body>
</html>
