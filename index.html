<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Iconic Store</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --accent: #FFCC00; --mtn-blue: #003399;
            --glass: rgba(255, 255, 255, 0.05); --success: #25D366;
        }

        .light-mode { --bg: #f8f9fa; --card: #ffffff; --text: #121212; --glass: rgba(0, 0, 0, 0.05); }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            transition: all 0.4s ease;
        }

        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-weight: 900; letter-spacing: -1.5px; font-size: 22px; color: var(--accent); }
        
        .app-container { 
            background: var(--card); width: 100%; max-width: 400px; 
            border-radius: 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); 
            padding: 25px; box-sizing: border-box; border: 1px solid var(--glass);
        }

        .bundle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .bundle-card { 
            border: 1px solid var(--glass); padding: 20px; border-radius: 25px; 
            text-align: center; cursor: pointer; background: var(--glass); 
            position: relative; transition: all 0.3s ease; 
        }

        .bundle-card.selected { border: 2px solid var(--accent); background: var(--accent) !important; color: #000; transform: scale(1.05); }
        .bundle-card.selected strong { color: #000; }

        /* Form Visibility */
        .form-section { display: none; margin-top: 30px; animation: fadeIn 0.5s ease; }
        .form-section.active { display: block; }

        .copy-box { background: var(--mtn-blue); color: white; padding: 20px; border-radius: 25px; text-align: center; }
        input { width: 100%; padding: 18px; margin: 15px 0; border: 1px solid var(--glass); border-radius: 20px; background: var(--glass); color: var(--text); font-size: 18px; text-align: center; box-sizing: border-box; }

        /* Progress Bar Styles */
        .progress-container { display: none; margin-top: 20px; text-align: center; }
        .progress-bar-bg { width: 100%; background: var(--glass); height: 12px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; }
        
        .pay-btn { width: 100%; background: var(--accent); color: black; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">JOELDATA.</div>
</div>

<div class="app-container">
    <div class="bundle-grid" id="bundleContainer"></div>
    
    <div class="form-section" id="orderForm">
        <div class="copy-box">
            <span style="font-size:11px; opacity:0.8">STEP 1: SEND MONEY TO</span><br>
            <strong style="font-size: 24px;">0248745662</strong><br>
            <button onclick="copyMyNumber()" style="margin-top:12px; background:white; border:none; padding:10px 20px; border-radius:15px; font-weight:bold; cursor:pointer;">COPY NUMBER</button>
        </div>

        <input type="tel" id="recipientPhone" placeholder="Enter Recipient Number" maxlength="10">
        
        <button class="pay-btn" id="payBtn" onclick="startPaymentProcess()">CONFIRM & PAY</button>

        <div class="progress-container" id="progContainer">
            <span id="statusText" style="font-size: 14px; font-weight: bold;">Almost done...</span>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="fill"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const myMomo = "0248745662";
    let currentOrder = { gb: 0, price: 0 };

    // Generate Bundles
    const container = document.getElementById('bundleContainer');
    for (let gb = 1; gb <= 10; gb++) {
        let price = (gb * 5) + 1;
        const card = document.createElement('div');
        card.className = 'bundle-card';
        card.innerHTML = `<strong>${gb}GB</strong><span>${price} GHS</span>`;
        card.onclick = () => {
            document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            currentOrder = { gb, price };
            document.getElementById('orderForm').classList.add('active');
        };
        container.appendChild(card);
    }

    function copyMyNumber() {
        navigator.clipboard.writeText(myMomo);
        if (navigator.vibrate) navigator.vibrate(50);
        alert("Number Copied! Paste it in the Momo menu.");
    }

    function startPaymentProcess() {
        const recipient = document.getElementById('recipientPhone').value;
        if (recipient.length < 10) { alert("Please enter a valid 10-digit number"); return; }

        // UI Changes
        document.getElementById('payBtn').style.display = 'none';
        document.getElementById('progContainer').style.display = 'block';

        let width = 0;
        const fill = document.getElementById('fill');
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                finalizeOrder(recipient);
            } else {
                width += 2;
                fill.style.width = width + '%';
            }
        }, 50); // Speed of the bar
    }

    function finalizeOrder(recipient) {
        const message = `ORDER CONFIRMED:%0A---%0ABundle: ${currentOrder.gb}GB%0APrice: ${currentOrder.price} GHS%0ARecipient: ${recipient}%0A---%0APlease process manually.`;
        
        // 1. Dial USSD
        window.location.href = "tel:*170#";

        // 2. Redirect to WhatsApp after 4 seconds
        setTimeout(() => {
            window.location.href = `https://wa.me/233248745662?text=${message}`;
        }, 4000);
    }
</script>

</body>
</html>
