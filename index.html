<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #666;
        }
        .whatsapp-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        .whatsapp-btn:hover {
            background-color: #128C7E;
            transform: scale(1.05);
        }
        .phone-number {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 50px;">🛠️</div>
        <h1>Under Maintenance</h1>
        <p>We’re currently updating our store to serve you better. We'll be back online shortly!</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <p><strong>Want to place an order?</strong></p>
        
        <!-- WhatsApp Link -->
        <a href="https://wa.me/233248745662?text=Hello!%20I%20would%20like%20to%20place%20an%20order." class="whatsapp-btn">
            Order via WhatsApp
        </a>
        
        <span class="phone-number">Call us: 0248745662</span>
    </div>

</body>
</html>
