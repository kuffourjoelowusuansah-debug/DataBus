<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Premium Store</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --accent: #FFCC00;
            --mtn-blue: #003399;
            --glass: rgba(255, 255, 255, 0.08);
            --success: #25D366;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .header { width: 100%; max-width: 400px; text-align: center; margin-bottom: 30px; }
        .logo { font-weight: 900; font-size: 28px; color: var(--accent); letter-spacing: -1px; }

        .app-container { 
            background: var(--card); 
            width: 100%; max-width: 400px; 
            border-radius: 40px; 
            padding: 25px; box-sizing: border-box; 
            border: 1px solid var(--glass);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .bundle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* THE "COOL DESIGN" FIX */
        .bundle-card { 
            border: 1px solid var(--glass); 
            padding: 22px 10px; border-radius: 25px; 
            text-align: center; cursor: pointer; 
            background: var(--glass); 
            display: flex; flex-direction: column; /* This keeps text separate */
            justify-content: center; align-items: center;
            gap: 8px; /* Spacing between GB and GHS */
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .bundle-card:hover { border-color: var(--accent); background: rgba(255, 204, 0, 0.05); }

        .bundle-card.selected {
            border: 2px solid var(--mtn-blue) !important;
            background: var(--accent) !important;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 204, 0, 0.2);
        }

        .bundle-card strong { font-size: 24px; color: var(--accent); }
        .bundle-card span { font-size: 14px; color: #aaa; font-weight: 600; }
        .bundle-card.selected strong, .bundle-card.selected span { color: #000 !important; }

        /* FORM DESIGN */
        #orderForm { margin-top: 30px; display: none; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { background: var(--glass); padding: 20px; border-radius: 30px; border: 1px solid var(--glass); }
        input { width: 100%; padding: 18px; margin-top: 10px; border: 1px solid var(--glass); border-radius: 20px; background: var(--bg); color: var(--text); font-size: 18px; text-align: center; box-sizing: border-box; outline: none; }
        .pay-btn { width: 100%; background: var(--accent); color: black; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 15px; }

        .footer { margin-top: 50px; text-align: center; font-size: 12px; opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">JOELDATA</div>
</div>

<div class="app-container">
    <div class="bundle-grid" id="bundleContainer"></div>
    
    <div id="orderForm">
        <div class="input-group">
            <small style="color:var(--accent); font-weight:bold; text-transform:uppercase;">Step 1: Transfer Funds</small>
            <div style="font-size:20px; margin: 10px 0; font-weight:900;">0248745662</div>
            <button onclick="copyNum()" style="background:var(--mtn-blue); color:white; border:none; padding:8px 15px; border-radius:12px; font-weight:bold; cursor:pointer; font-size:11px;">COPY NUMBER</button>
            <input type="tel" id="recipientPhone" placeholder="Recipient Number">
        </div>
        <button class="pay-btn" onclick="handlePay()">CONFIRM & PAY</button>
    </div>
</div>

<div class="footer">
    SECURE • FAST • RELIABLE
</div>

<script>
    const momo = "0248745662";
    let activeOrder = { gb: 0, price: 0 };

    const grid = document.getElementById('bundleContainer');
    for (let i = 1; i <= 10; i++) {
        let p = (i * 5) + 1;
        let card = document.createElement('div');
        card.className = 'bundle-card';
        card.innerHTML = `<strong>${i}GB</strong><span>${p} GHS</span>`;
        card.onclick = () => {
            document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            activeOrder = { gb: i, price: p };
            document.getElementById('orderForm').style.display = 'block';
            window.scrollTo({ top: 500, behavior: 'smooth' });
        };
        grid.appendChild(card);
    }

    function copyNum() { navigator.clipboard.writeText(momo); alert("Copied!"); }
    function handlePay() {
        const ph = document.getElementById('recipientPhone').value;
        if(ph.length < 10) return alert("Enter valid number");
        window.location.href = "tel:*170#";
        setTimeout(() => { window.location.href = `https://wa.me/233248745662?text=Order: ${activeOrder.gb}GB to ${ph}`; }, 5000);
    }
</script>
</body>
</html>
