<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Iconic Store</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --accent: #FFCC00; --mtn-blue: #003399;
            --glass: rgba(255, 255, 255, 0.05); --success: #25D366;
        }

        .light-mode {
            --bg: #f8f9fa; --card: #ffffff; --text: #121212; --glass: rgba(0, 0, 0, 0.05);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px 20px 100px 20px; display: flex; flex-direction: column; align-items: center;
            transition: 0.3s;
        }

        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-weight: 900; letter-spacing: -1.5px; font-size: 22px; color: var(--accent); }
        .theme-btn { background: var(--glass); border: 1px solid var(--glass); color: var(--text); padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 11px; font-weight: bold; }

        .app-container { 
            background: var(--card); width: 100%; max-width: 400px; 
            border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
            padding: 25px; box-sizing: border-box; border: 1px solid var(--glass);
        }

        .bundle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .bundle-card { 
            border: 1px solid var(--glass); padding: 20px; border-radius: 25px; 
            text-align: center; cursor: pointer; background: var(--glass); 
            position: relative; transition: 0.2s; 
        }

        .stock-tag { font-size: 9px; text-transform: uppercase; font-weight: bold; padding: 4px 8px; border-radius: 10px; position: absolute; top: 8px; right: 8px; }
        .in-stock { background: rgba(37, 211, 102, 0.1); color: var(--success); }
        .low-stock { background: rgba(255, 204, 0, 0.1); color: var(--accent); }

        .bundle-card.selected { border: 2px solid var(--accent); background: var(--accent) !important; color: #000; }
        .bundle-card.selected strong { color: #000; }

        #orderForm { display: none; margin-top: 25px; animation: slideUp 0.4s ease; }
        #orderForm.active { display: block; }

        .copy-box { background: var(--mtn-blue); color: white; padding: 20px; border-radius: 25px; text-align: center; margin-bottom: 15px; }
        .copy-btn { margin-top: 12px; background: white; border: none; padding: 8px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        input { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--glass); background: var(--glass); color: var(--text); font-size: 18px; text-align: center; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        
        .pay-btn { width: 100%; background: var(--accent); color: black; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; }

        .info-section { margin-top: 25px; padding: 20px; background: var(--glass); border-radius: 25px; border: 1px solid var(--glass); }
        .info-title { font-size: 14px; font-weight: 800; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .info-content { font-size: 13px; line-height: 1.6; opacity: 0.8; }

        /* --- NEW BOTTOM NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card); border-top: 1px solid var(--glass);
            display: flex; justify-content: space-around; padding: 15px 0;
            z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text); opacity: 0.5; cursor: pointer; font-size: 10px; font-weight: bold;
        }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">JOELDATA.</div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 DARK</button>
</div>

<div class="app-container" id="homePage">
    <div class="bundle-grid" id="bundleGrid"></div>
    <div id="orderForm">
        <div class="copy-box">
            <span style="font-size:11px; opacity:0.8">STEP 1: SEND MONEY TO</span><br>
            <strong style="font-size: 22px;">0248745662</strong><br>
            <button class="copy-btn" onclick="copyNum()">COPY NUMBER</button>
        </div>
        <input type="tel" id="recipientPhone" placeholder="Recipient Number" maxlength="10">
        <button class="pay-btn" onclick="processOrder()" id="mainBtn">CONFIRM & PAY</button>
        <p id="statusMsg" style="text-align: center; font-size: 13px; font-weight: bold; display: none; color: var(--accent);">Almost done... Dialing *170#</p>
    </div>

    <div class="info-section">
        <div class="info-title">📖 How To Buy</div>
        <div class="info-content">Select bundle, pay Merchant, enter number, and confirm via WhatsApp.</div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home')">
        <div class="nav-icon">🏠</div><span>HOME</span>
    </div>
    <div class="nav-item" onclick="checkEligibility()">
        <div class="nav-icon">⭐</div><span>OFFERS</span>
    </div>
    <div class="nav-item" onclick="openShare()">
        <div class="nav-icon">🔗</div><span>SHARE</span>
    </div>
    <div class="nav-item" onclick="switchPage('history')">
        <div class="nav-icon">🕒</div><span>HISTORY</span>
    </div>
</div>

<script>
    const myMomo = "0248745662";
    let selectedGB = 0;
    
    // Tracking purchase count
    let purchaseCount = localStorage.getItem('purchaseCount') || 0;

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        document.getElementById('themeBtn').innerText = isLight ? "☀️ LIGHT" : "🌙 DARK";
    }

    const grid = document.getElementById('bundleGrid');
    for (let gb = 1; gb <= 10; gb++) {
        const card = document.createElement('div');
        card.className = 'bundle-card';
        card.innerHTML = `<strong>${gb}GB</strong><br><span>${(gb * 5) + 1} GHS</span>`;
        card.onclick = () => {
            document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedGB = gb;
            document.getElementById('orderForm').classList.add('active');
        };
        grid.appendChild(card);
    }

    function processOrder() {
        const phone = document.getElementById('recipientPhone').value;
        if(phone.length < 10) return alert("Enter valid number");
        
        // Increase purchase count
        purchaseCount++;
        localStorage.setItem('purchaseCount', purchaseCount);

        document.getElementById('mainBtn').innerText = "DIALING...";
        document.getElementById('statusMsg').style.display = "block";
        window.location.href = "tel:*170#";
        setTimeout(() => {
            const text = `ORDER: ${selectedGB}GB for ${phone}`;
            window.location.href = `https://wa.me/233248745662?text=${encodeURIComponent(text)}`;
        }, 3000);
    }

    function checkEligibility() {
        if(purchaseCount < 10) {
            alert(`❌ INELIGIBLE: You have made ${purchaseCount}/10 purchases. Buy more to unlock Special Offers!`);
        } else {
            alert("✅ Welcome to Special Offers! Contact us on WhatsApp for your discount.");
        }
    }

    function openShare() {
        const shareText = "I just got affordable data from JoelData! If you share this link to 15 friends, you unlock rewards. Buy here: " + window.location.href;
        
        if (navigator.share) {
            navigator.share({ title: 'JoelData', text: shareText, url: window.location.href });
        } else {
            window.location.href = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
        }
    }

    function switchPage(page) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        if(page === 'history') {
            alert(`You have made ${purchaseCount} successful orders so far.`);
        }
    }

    function copyNum() {
        navigator.clipboard.writeText(myMomo);
        alert("Number Copied!");
    }
</script>

</body>
</html>
