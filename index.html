<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniLink Dashboard</title>
<style>
    /* Base Reset and Variables */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    :root {
        --bg-main: #1C334A; /* Exact deep blue background */
        --card-yellow: #FCE863; /* High-contrast yellow */
        --card-dark: #2A435B; /* Darker blue for shortcuts */
        --text-light: #FFFFFF;
        --text-dark: #1A212A;
        --btn-black: #1A1A1A;
    }

    body {
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    /* Mobile Container */
    .mobile-app {
        background-color: var(--bg-main);
        width: 100%;
        max-width: 400px;
        height: 850px;
        border-radius: 40px;
        padding: 30px 20px;
        overflow-y: auto;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Header Section */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .greeting h1 {
        color: var(--text-light);
        font-size: 24px;
        font-weight: 700;
    }

    .header-icons {
        display: flex;
        gap: 10px;
    }

    .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        font-size: 18px;
    }

    .btn-notification { background-color: var(--card-yellow); color: var(--text-dark); }
    .btn-menu { background-color: #4CB1D6; color: var(--text-light); }

    /* Search Bar */
    .search-container {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
    }

    .search-box {
        flex: 1;
        background-color: var(--card-dark);
        border-radius: 20px;
        display: flex;
        align-items: center;
        padding: 0 15px;
    }

    .search-box input {
        background: transparent;
        border: none;
        color: var(--text-light);
        width: 100%;
        padding: 12px 10px;
        outline: none;
        font-size: 14px;
    }

    .search-box input::placeholder { color: #8FA6BE; }
    
    .filter-btn {
        width: 45px;
        height: 45px;
        background-color: var(--card-yellow);
        border-radius: 50%;
        border: none;
        cursor: pointer;
    }

    /* Main Yellow Card */
    .main-card {
        background-color: var(--card-yellow);
        border-radius: 24px;
        padding: 20px;
        margin-bottom: 30px;
        color: var(--text-dark);
    }

    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }

    .status-badge {
        background-color: rgba(0,0,0,0.05);
        padding: 6px 12px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .amount-display h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 5px;
        color: #555;
    }

    .amount-display .amount {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 20px;
    }

    .card-bottom {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
    }

    .live-status {
        font-size: 12px;
        font-weight: 600;
        color: #4A5568;
    }

    .live-badge {
        display: inline-block;
        background-color: #2F4F4F;
        color: #4ADE80;
        padding: 4px 10px;
        border-radius: 20px;
        margin-bottom: 5px;
    }

    .btn-details {
        background-color: var(--btn-black);
        color: var(--text-light);
        padding: 10px 20px;
        border-radius: 20px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
    }

    /* Shortcuts Section */
    .shortcuts-header {
        display: flex;
        justify-content: space-between;
        color: var(--text-light);
        margin-bottom: 15px;
        font-weight: 600;
    }

    .shortcuts-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .shortcut-card {
        background-color: var(--card-dark);
        border-radius: 16px;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--text-light);
        font-weight: 500;
        font-size: 14px;
        cursor: pointer;
    }

    .shortcut-icon {
        color: var(--card-yellow);
        font-size: 18px;
    }
</style>
</head>
<body>

<div class="mobile-app">
    <!-- Header -->
    <div class="header">
        <div class="greeting">
            <!-- Personalized Greeting -->
            <h1>Hi, Joel!</h1> 
        </div>
        <div class="header-icons">
            <button class="icon-btn btn-notification">🔔</button>
            <button class="icon-btn btn-menu">☰</button>
        </div>
    </div>

    <!-- Search Area -->
    <div class="search-container">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="Search student links">
        </div>
        <button class="filter-btn">⚙️</button>
    </div>

    <!-- Main Data Card -->
    <div class="main-card">
        <div class="card-top">
            <div class="status-badge">
                👤 STUDENT
            </div>
            <span style="font-weight: bold; cursor:pointer;">...</span>
        </div>
        
        <div class="amount-display">
            <h2>TOTAL SPENT</h2>
            <div class="amount">GHC 0.00</div>
        </div>

        <div class="card-bottom">
            <div class="live-status">
                <div class="live-badge">● LIVE: 10 - 5000</div><br>
                (no no passenger added)
            </div>
            <a href="#" class="btn-details">See Details &gt;</a>
        </div>
    </div>

    <!-- Shortcuts Grid -->
    <div class="shortcuts-header">
        <span>My Shortcut</span>
        <span>→</span>
    </div>
    
    <div class="shortcuts-grid">
        <div class="shortcut-card">
            <span>Buy Data</span>
            <span class="shortcut-icon">⚡</span>
        </div>
        <div class="shortcut-card">
            <span>Special Offer</span>
            <span class="shortcut-icon">🎁</span>
        </div>
        <div class="shortcut-card">
            <span>History</span>
            <span class="shortcut-icon">🕒</span>
        </div>
        <div class="shortcut-card">
            <span>Share and Earn</span>
            <span class="shortcut-icon">🔗</span>
        </div>
    </div>
</div>

</body>
</html>
