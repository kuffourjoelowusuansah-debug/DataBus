
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>UniLink | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-black text-white font-sans">
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-2xl font-black tracking-tighter text-blue-500">UniLink</h1>
        <div class="flex gap-6 text-[10px] font-bold uppercase tracking-widest">
            <a href="shop.html" class="text-gray-400">Shop</a>
            <a href="leaderboard.html" class="text-gray-400">Leaderboard</a>
            <a href="dashboard.html" class="bg-white text-black px-4 py-2 rounded-full">My Account</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-20">
        <div class="text-center mb-20">
            <h1 class="text-7xl font-black tracking-tighter mb-4">Data for <span class="text-blue-500">Giants.</span></h1>
            <p class="text-gray-500">The most reliable data delivery system in Ghana.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-[#111] p-10 rounded-[3rem] border border-white/5">
                <i class="fa-solid fa-bolt text-3xl text-yellow-500 mb-6"></i>
                <h3 class="text-xl font-bold">Instant Refill</h3>
                <p class="text-sm text-gray-500 mt-2">No waiting. Your bundle drops the moment you pay.</p>
            </div>
            <div class="bg-[#111] p-10 rounded-[3rem] border border-blue-500/20">
                <i class="fa-solid fa-trophy text-3xl text-blue-500 mb-6"></i>
                <h3 class="text-xl font-bold">Weekly Prizes</h3>
                <p class="text-sm text-gray-500 mt-2">The top buyer every week gets 5GB for free.</p>
            </div>
            <div class="bg-[#111] p-10 rounded-[3rem] border border-white/5">
                <i class="fa-solid fa-shield-check text-3xl text-green-500 mb-6"></i>
                <h3 class="text-xl font-bold">Safe Pay</h3>
                <p class="text-sm text-gray-500 mt-2">Powered by Paystack's enterprise security.</p>
            </div>
        </div>
    </main>
</body>
</html>
