<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataBus | High-Speed Data Transit</title>

<!-- FIXED Firebase (no duplicates) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://js.paystack.co/v2/inline.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{font-family:'Plus Jakarta Sans',sans-serif;background:#020617;color:#fff}
.hidden-view{display:none}
</style>
</head>

<body class="max-w-md mx-auto min-h-screen">

<!-- HOME -->
<div id="homeView">
<button onclick="handleAuthClick()" id="authBtn">LOGIN</button>
<h2 id="userName">Loading...</h2>
<h1 id="totalSpent">0.00</h1>

<button onclick="showTickets()">Buy Data</button>
<button onclick="showHistory()">History</button>
<button onclick="showInbox()">Inbox</button>
<button onclick="handleSpecialOffer()">Offer</button>
</div>

<!-- TICKETS -->
<div id="ticketsView" class="hidden-view">
<button onclick="showHome()">Back</button>
<button onclick="showBundles('MTN')">MTN</button>
<button onclick="showBundles('AT')">AT</button>
<button onclick="showBundles('TELECEL')">Telecel</button>
</div>

<!-- BUNDLES -->
<div id="bundlesView" class="hidden-view">
<button onclick="showTickets()">Back</button>
<div id="bundleList"></div>
</div>

<!-- CHECKOUT -->
<div id="checkoutView" class="hidden-view">
<button onclick="showBundles(currentNet)">Back</button>

<h2 id="checkBundle"></h2>
<p id="checkNet"></p>
<p id="checkRef"></p>

<p id="checkPrice"></p>
<p id="checkFee"></p>
<p id="checkTotal"></p>

<input id="recipientPhone" placeholder="Phone">
<input id="buyerEmail" placeholder="Email">

<button onclick="handlePayment()">Pay</button>
</div>

<!-- HISTORY -->
<div id="historyView" class="hidden-view">
<button onclick="showHome()">Back</button>
<div id="historyList"></div>
</div>

<!-- INBOX -->
<div id="inboxView" class="hidden-view">
<button onclick="showHome()">Back</button>
<p>Inbox working</p>
</div>

<!-- SPECIAL OFFER -->
<div id="specialOfferView" class="hidden-view">
<button onclick="showHome()">Back</button>

<input id="offerNum" placeholder="Number">
<input id="offerCode" placeholder="Code">

<button onclick="submitSpecialOffer()">Submit</button>
</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyCqg3E9tuKRcEnq2DdP6FjtG0LqnAjCHfM",
authDomain:"joeldata-25d06.firebaseapp.com",
projectId:"joeldata-25d06"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentNet="MTN", selG="", selP=0, activeRef="";

function hideAll(){
homeView.classList.add("hidden-view");
ticketsView.classList.add("hidden-view");
bundlesView.classList.add("hidden-view");
checkoutView.classList.add("hidden-view");
historyView.classList.add("hidden-view");
inboxView.classList.add("hidden-view");
specialOfferView.classList.add("hidden-view");
}

function showHome(){hideAll();homeView.classList.remove("hidden-view")}
function showTickets(){hideAll();ticketsView.classList.remove("hidden-view")}
function showInbox(){hideAll();inboxView.classList.remove("hidden-view")}
function showHistory(){hideAll();historyView.classList.remove("hidden-view");renderHistory()}

function handleSpecialOffer(){
hideAll();
specialOfferView.classList.remove("hidden-view");
}

function submitSpecialOffer(){
alert("Submitted");
}

function showBundles(network){
hideAll();
currentNet=network;

const data={
MTN:[{gb:"1GB",price:5},{gb:"2GB",price:10}],
AT:[{gb:"1GB",price:4.5}],
TELECEL:[{gb:"10GB",price:40}]
};

bundleList.innerHTML="";

data[network].forEach(b=>{
bundleList.innerHTML+=`
<div>
<h3>${b.gb}</h3>
<p>₵${b.price}</p>
<button onclick="openCheckout('${b.gb}',${b.price})">Buy</button>
</div>`;
});

bundlesView.classList.remove("hidden-view");
}

function openCheckout(gb,price){
hideAll();
selG=gb;
selP=parseFloat(price);

activeRef="DB-"+Math.floor(Math.random()*1000000);

checkBundle.innerText=gb;
checkNet.innerText=currentNet;
checkRef.innerText=activeRef;

const fee=(selP<30?0.3:0.9);
checkPrice.innerText=selP;
checkFee.innerText=fee;
checkTotal.innerText=(selP+fee).toFixed(2);

checkoutView.classList.remove("hidden-view");
}

auth.onAuthStateChanged(async user=>{
const greeting="Hello";

if(user){
const name=user.displayName?user.displayName.split(" ")[0]:"User";
userName.innerText=`${greeting}, ${name}`;
buyerEmail.value=user.email||"";

const snap=await db.collection("orders").where("email","==",user.email).get();

let total=0;
snap.forEach(doc=>total+=parseFloat(doc.data().amount||0));

totalSpent.innerText=total.toFixed(2);
authBtn.innerText="LOGOUT";
}else{
userName.innerText="Hello, Passenger";
totalSpent.innerText="0.00";
authBtn.innerText="LOGIN";
}
});

function handleAuthClick(){
if(auth.currentUser){auth.signOut();}
else{auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}
}

function handlePayment(){
const phone=recipientPhone.value.trim();
const email=buyerEmail.value.trim();

if(phone.length!==10) return alert("Invalid phone");
if(!email) return alert("Enter email");

const fee=(selP<30?0.3:0.9);

PaystackPop.setup({
key:'pk_live_90305707d30b6282979eac837bbbc9509da579af',
email:email,
amount:Math.round((selP+fee)*100),
currency:'GHS',
ref:activeRef,

callback:(res)=>{
const now=new Date();

if(auth.currentUser){
db.collection("orders").add({
email:auth.currentUser.email,
phone,
amount:selP,
bundle:`${selG} ${currentNet}`,
ref:res.reference,
date:now.toLocaleDateString(),
timestamp:firebase.firestore.FieldValue.serverTimestamp()
});
}

window.location.href=`https://wa.me/233248745662?text=ORDER ${selG} ${currentNet}`;
}
}).openIframe();
}

async function renderHistory(){
if(!auth.currentUser){
historyList.innerHTML="Login first";
return;
}

const snap=await db.collection("orders")
.where("email","==",auth.currentUser.email).get();

historyList.innerHTML="";

snap.forEach(doc=>{
const d=doc.data();
historyList.innerHTML+=`
<div>
${d.bundle} - ₵${d.amount}
</div>`;
});
}
</script>

</body>
</html>
