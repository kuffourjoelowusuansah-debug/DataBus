<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataBus | High-Speed Data Transit</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://js.paystack.co/v2/inline.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
--bg-deep:#020617;
--cyber-yellow:#facc15;
--pure-white:#ffffff;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg-deep);color:#fff;}
.hidden-view{display:none!important;}
</style>
</head>

<body class="max-w-md mx-auto min-h-screen">

<div id="homeView">
<header class="p-5 flex justify-between items-center bg-black/50 sticky top-0">
<button onclick="handleAuthClick()" id="authBtn" class="text-yellow-400">LOGIN</button>
<div class="font-black">DataBus</div>
<button onclick="showInbox()">🔔</button>
</header>

<main class="p-6">
<h2 id="userName">Loading...</h2>
<h1>GH₵ <span id="totalSpent">0.00</span></h1>

<button onclick="showTickets()">Buy Data</button>
<button onclick="handleSpecialOffer()">Special Offer</button>
<button onclick="showHistory()">History</button>
</main>
</div>

<div id="ticketsView" class="hidden-view">
<button onclick="showHome()">⬅</button>
<h2>Networks</h2>
<button onclick="showBundles('MTN')">MTN</button>
<button onclick="showBundles('AT')">AT</button>
<button onclick="showBundles('TELECEL')">Telecel</button>
</div>

<div id="bundlesView" class="hidden-view">
<button onclick="showTickets()">⬅</button>
<h2 id="bundleTitle"></h2>
<div id="bundleList"></div>
</div>

<div id="checkoutView" class="hidden-view">
<button onclick="showBundles(currentNet)">⬅</button>

<h2 id="checkBundle"></h2>
<p id="checkNet"></p>
<p id="checkRef"></p>

<p id="checkTotal"></p>

<input id="recipientPhone" placeholder="024XXXXXXX">
<input id="buyerEmail" placeholder="Email">

<button onclick="handlePayment()">Pay</button>
</div>

<div id="historyView" class="hidden-view">
<button onclick="showHome()">⬅</button>
<div id="historyList"></div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCqg3E9tuKRcEnq2DdP6FjtG0LqnAjCHfM",
authDomain:"joeldata-25d06.firebaseapp.com",
projectId:"joeldata-25d06"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let currentNet="MTN", selG="", selP=0, activeRef="";
let timerInterval;
let counterInterval;

function getGreeting(){
const h=new Date().getHours();
if(h<12)return"Good Morning";
if(h<17)return"Good Afternoon";
return"Good Evening";
}

function handleAuthClick(){
if(auth.currentUser) auth.signOut();
else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

auth.onAuthStateChanged(async user=>{
const greeting=getGreeting();
const btn=document.getElementById('authBtn');

if(user){
btn.innerText="LOGOUT";

const name=user.displayName?user.displayName.split(' ')[0]:"User";
document.getElementById('userName').innerText=`${greeting}, ${name}`;
document.getElementById('buyerEmail').value=user.email||"";

const snap=await db.collection('orders').where('email','==',user.email).get();
let total=0;
snap.forEach(doc=> total+=parseFloat(doc.data().amount));
document.getElementById('totalSpent').innerText=total.toFixed(2);

}else{
btn.innerText="LOGIN";
document.getElementById('userName').innerText=`${greeting}, Passenger`;
document.getElementById('totalSpent').innerText="0.00";
}
});

function hideAll(){
['homeView','ticketsView','bundlesView','checkoutView','historyView']
.forEach(id=>document.getElementById(id).classList.add('hidden-view'));
}

function showHome(){hideAll();homeView.classList.remove('hidden-view');}
function showTickets(){hideAll();ticketsView.classList.remove('hidden-view');}
function showHistory(){hideAll();historyView.classList.remove('hidden-view');renderHistory();}

async function renderHistory(){
const list=document.getElementById('historyList');

if(!auth.currentUser){
list.innerHTML="Login to see history";
return;
}

const snap=await db.collection('orders')
.where('email','==',auth.currentUser.email)
.get();

list.innerHTML="";
snap.forEach(doc=>{
const d=doc.data();
list.innerHTML+=`<p>${d.bundle} - ₵${d.amount}</p>`;
});
}

const dataSets={
MTN:{prices:[{gb:"1GB",price:5},{gb:"2GB",price:10}]},
AT:{prices:[{gb:"1GB",price:4.5}]},
TELECEL:{prices:[{gb:"10GB",price:40}]}
};

function showBundles(network){
hideAll();
currentNet=network;

bundleTitle.innerText=network;
bundleList.innerHTML="";

dataSets[network].prices.forEach(i=>{
bundleList.innerHTML+=`
<button onclick="openCheckout('${i.gb}',${i.price})">
${i.gb} - ₵${i.price}
</button>`;
});

bundlesView.classList.remove('hidden-view');
}

function openCheckout(gb,price){
hideAll();

selG=gb;
selP=parseFloat(price);
activeRef="DB-"+Math.floor(100000+Math.random()*900000);

const fee=selP<30?0.3:0.9;
const total=(selP+fee).toFixed(2);

checkBundle.innerText=gb;
checkNet.innerText=currentNet;
checkRef.innerText=activeRef;
checkTotal.innerText="₵ "+total;

checkoutView.classList.remove('hidden-view');
}

function handlePayment(){
const phone=recipientPhone.value.trim();
const email=buyerEmail.value.trim();

if(!phone || phone.length!==10 || !phone.startsWith('0')){
return alert("Enter valid Ghana number");
}

if(!email){
return alert("Enter email");
}

const fee=selP<30?0.3:0.9;

const handler=PaystackPop.setup({
key:'pk_live_90305707d30b6282979eac837bbbc9509da579af',
email:email,
amount:Math.round((selP+fee)*100),
currency:'GHS',
ref:activeRef,

callback:(res)=>{
const now=new Date();

if(auth.currentUser){
db.collection('orders').add({
email:auth.currentUser.email,
phone:phone,
amount:selP,
bundle:`${selG} ${currentNet}`,
ref:res.reference,
date:now.toLocaleDateString()
});
}

window.location.href=`https://wa.me/233248745662?text=ORDER ${selG} ${currentNet} ${phone}`;
}
});

handler.openIframe();
}

/* OFFER FIX */
function handleSpecialOffer(){
if(new Date().getHours()>=14){
alert("Expired");
return;
}

clearInterval(timerInterval);
startOfferTimer();
}

function startOfferTimer(){
timerInterval=setInterval(()=>{
console.log("running...");
},1000);
}

/* COUNTER FIX */
function updateCounter(){
console.log("counter...");
}
counterInterval=setInterval(updateCounter,3000);

</script>
</body>
</html>
