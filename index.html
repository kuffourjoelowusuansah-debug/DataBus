<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Iconic Store</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --accent: #FFCC00;
            --mtn-blue: #003399;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #25D366;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-weight: 900; font-size: 22px; color: var(--accent); }

        .app-container { 
            background: var(--card); 
            width: 100%; max-width: 400px; 
            border-radius: 35px; 
            padding: 25px; box-sizing: border-box; 
            border: 1px solid var(--glass);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .bundle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .bundle-card { 
            border: 1px solid var(--glass); 
            padding: 20px; border-radius: 25px; 
            text-align: center; cursor: pointer; 
            background: var(--glass); 
            position: relative;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .bundle-card.selected {
            border: 2px solid var(--mtn-blue) !important;
            background: var(--accent) !important;
            transform: scale(1.03);
        }
        .bundle-card.selected strong, .bundle-card.selected span { color: #000 !important; }
        .bundle-card strong { display: block; font-size: 26px; color: var(--accent); }

        /* FIXED FORM DESIGN */
        #orderForm { margin-top: 30px; display: none; border-top: 1px solid var(--glass); padding-top: 20px; }
        .copy-box { background: var(--mtn-blue); color: white; padding: 20px; border-radius: 25px; text-align: center; margin-bottom: 15px; }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border: 1px solid var(--glass); border-radius: 20px; background: var(--glass); color: var(--text); font-size: 18px; text-align: center; box-sizing: border-box; outline: none; }
        .pay-btn { width: 100%; background: var(--accent); color: black; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; }

        /* LIVE NOTIFICATION (Small & Clean) */
        #notif { position: fixed; top: 20px; background: var(--accent); color: black; padding: 10px 20px; border-radius: 50px; font-size: 12px; font-weight: bold; transform: translateY(-100px); transition: 0.5s; z-index: 9999; box-shadow: 0 5px 15px rgba(255,204,0,0.3); }
        #notif.show { transform: translateY(0); }

        /* TRACKER OVERLAY */
        #tracker { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:10000; text-align:center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--glass); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .refer-btn { margin-top: 20px; background: var(--success); color: white; border: none; padding: 15px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; text-decoration: none; display: flex; justify-content: center; align-items: center; }
        .footer { margin-top: 40px; text-align: center; font-size: 11px; opacity: 0.4; padding-bottom: 30px; }
    </style>
</head>
<body>

<div id="notif">Someone just bought 5GB! ⚡</div>

<div id="tracker">
    <div class="spinner"></div>
    <h2 id="trackMsg" style="color:var(--accent)">Securing Connection...</h2>
    <p style="opacity:0.6; font-size:13px;">Wait for the MoMo Prompt</p>
</div>

<div class="header">
    <div class="logo">JOELDATA.</div>
</div>

<div class="app-container">
    <div class="bundle-grid" id="bundleContainer"></div>
    
    <div id="orderForm">
        <div class="copy-box">
            <small>PAY TO:</small><br>
            <strong style="font-size: 22px;">0248745662</strong><br>
            <button onclick="copyNum()" style="margin-top:10px; background:white; border:none; padding:5px 15px; border-radius:10px; font-weight:bold; cursor:pointer;">COPY NUMBER</button>
        </div>
        <input type="tel" id="recipientPhone" placeholder="Recipient Number">
        <button class="pay-btn" onclick="payWithTrack()">CONFIRM & PAY</button>
        
        <button class="refer-btn" onclick="shareApp()">🎁 SHARE & EARN DATA</button>
    </div>
</div>

<div class="footer">
    &copy; 2026 JOELDATA SERVICES GHANA <br>
    Terms • Privacy • Refunds
</div>

<script>
    const momo = "0248745662";
    let order = { gb: 0, price: 0 };

    // BUNDLES
    const cont = document.getElementById('bundleContainer');
    for (let i = 1; i <= 10; i++) {
        let p = (i * 5) + 1;
        let card = document.createElement('div');
        card.className = 'bundle-card';
        card.innerHTML = `<strong>${i}GB</strong><span>${p} GHS</span>`;
        card.onclick = () => {
            document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            order = { gb: i, price: p };
            document.getElementById('orderForm').style.display = 'block';
            window.scrollTo({ top: 400, behavior: 'smooth' });
        };
        cont.appendChild(card);
    }

    // SOCIAL PROOF
    function showPop() {
        const n = document.getElementById('notif');
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 3000);
    }
    setInterval(showPop, 40000);

    // TRACKER & PAY
    function payWithTrack() {
        const ph = document.getElementById('recipientPhone').value;
        if(ph.length < 10) return alert("Enter valid number");
        
        const track = document.getElementById('tracker');
        const msg = document.getElementById('trackMsg');
        track.style.display = 'flex';
        
        setTimeout(() => { msg.innerText = "Authorizing MoMo..."; }, 1500);
        setTimeout(() => { 
            track.style.display = 'none';
            window.location.href = `tel:*170%23`;
            setTimeout(() => {
                window.location.href = `https://wa.me/233248745662?text=ORDER: ${order.gb}GB to ${ph}`;
            }, 5000);
        }, 3000);
    }

    function copyNum() { navigator.clipboard.writeText(momo); alert("Number Copied!"); }
    function shareApp() { window.location.href = `https://wa.me/?text=Get cheap data on JoelData! Legit & Fast: https://joeldata.github.io`; }
</script>
</body>
</html>
