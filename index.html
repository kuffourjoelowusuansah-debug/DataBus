<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Iconic Store</title>
    <script src="https://js.paystack.co/v2/inline.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --accent: #FF3B30; 
            --accent-grad: linear-gradient(135deg, #FF3B30 0%, #FF9500 100%);
            --glass: rgba(255, 255, 255, 0.05);
        }
        .light-mode { --bg: #f8f9fa; --card: #ffffff; --text: #121212; --glass: rgba(0, 0, 0, 0.05); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 1200px; padding: 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .logo { font-weight: 900; font-size: 26px; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .app-container { width: 100%; max-width: 1200px; padding: 0 25px 50px 25px; box-sizing: border-box; }
        .features-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: var(--accent-grad); padding: 25px; border-radius: 25px; margin-bottom: 30px; color: white; box-shadow: 0 10px 20px rgba(255, 59, 48, 0.2); }
        .tabs-container { display: inline-flex; background: var(--glass); padding: 6px; border-radius: 20px; margin-bottom: 30px; border: 1px solid var(--glass); }
        .tab-btn { padding: 12px 30px; border: none; border-radius: 15px; background: none; color: var(--text); font-weight: 800; cursor: pointer; }
        .tab-btn.active { background: var(--accent-grad); color: #fff; }
        .bundle-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; width: 100%; }
        
        .bundle-card { 
            background: var(--accent-grad); border-radius: 25px; padding: 25px;
            display: flex; flex-direction: column; gap: 15px; color: white; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid transparent;
        }
        .bundle-card:hover { transform: translateY(-5px); }
        .bundle-card.selected { border-color: white; }
        .plate-amt { font-size: 48px; font-weight: 900; line-height: 1; }
        .plate-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 15px; }
        .detail-label { opacity: 0.7; font-size: 10px; text-transform: uppercase; font-weight: bold; }
        .detail-val { font-size: 14px; font-weight: 800; }
        .plate-buy-btn { width: 100%; background: #000; color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; }

        #orderForm { max-width: 500px; margin: 40px auto; background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--accent); display: none; }
        .large-input { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid var(--accent); background: var(--glass); color: var(--text); font-size: 18px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">JOELDATA.</div>
</header>

<main class="app-container">
    <div class="features-box">
        <div style="display:flex; align-items:center; gap:10px;"><i data-lucide="zap"></i> <div><b>Fast Delivery</b><br><small>Instant Activation</small></div></div>
        <div style="display:flex; align-items:center; gap:10px;"><i data-lucide="shield"></i> <div><b>Secured</b><br><small>100% Encrypted</small></div></div>
    </div>

    <div style="text-align: center;">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('mtn')">MTN Non-Expiry</button>
            <button class="tab-btn" onclick="switchTab('at')">AT 30 Days</button>
        </div>
    </div>

    <div id="mtnGrid" class="bundle-grid"></div>
    <div id="atGrid" class="bundle-grid" style="display:none;"></div>

    <div id="orderForm">
        <h2 id="orderLabel" style="text-align:center; color:var(--accent); margin-bottom:20px;"></h2>
        <input type="tel" id="recipientPhone" class="large-input" placeholder="Recipient Phone (02XXXXXXXX)" maxlength="10">
        <input type="email" id="buyerEmail" class="large-input" placeholder="Email for Receipt">
        <button class="plate-buy-btn" onclick="handlePayment()" style="background:var(--accent-grad); font-size:18px;">CONFIRM & PAY</button>
        <p style="font-size:11px; text-align:center; color:#FF3B30; margin-top:15px; font-weight:bold;">⚠️ NOTICE: Wrong numbers have no refunds. Please verify.</p>
    </div>
</main>

<script>
    let currentNet = "MTN"; let selG = ""; let selP = 0;
    
    const mtnData = [
        {g:"1GB",p:6},{g:"2GB",p:12},{g:"3GB",p:18},
        {g:"5GB",p:30},{g:"10GB",p:60},{g:"20GB",p:115},
        {g:"50GB",p:280}
    ];
    const atData = [
        {g:"1GB",p:5},{g:"2GB",p:10},{g:"3GB",p:15},
        {g:"5GB",p:25},{g:"10GB",p:48},{g:"20GB",p:95},
        {g:"50GB",p:240}
    ];

    window.onload = () => {
        renderGrid('mtnGrid', mtnData, 'MTN', 'Non Expiry', 'https://upload.wikimedia.org/wikipedia/commons/a/af/MTN_Logo.svg');
        renderGrid('atGrid', atData, 'AT', '30 Days', 'https://i.ibb.co/L6vV8yH/at-logo.png');
        lucide.createIcons();
    };

    function renderGrid(id, data, net, exp, logo) {
        const grid = document.getElementById(id);
        data.forEach(d => {
            const card = document.createElement('div');
            card.className = 'bundle-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="plate-amt">${d.g}</span>
                    <img src="${logo}" style="width:50px; height:50px; background:white; padding:5px; border-radius:12px; object-fit:contain;">
                </div>
                <div class="plate-details">
                    <div class="detail-item"><div class="detail-label">Price</div><div class="detail-val">₵${d.p.toFixed(2)}</div></div>
                    <div class="detail-item"><div class="detail-label">Stock</div><div class="detail-val" style="color:#2ecc71">In Stock</div></div>
                    <div class="detail-item"><div class="detail-label">Duration</div><div class="detail-val">${exp}</div></div>
                    <div class="detail-item"><div class="detail-label">Delivery</div><div class="detail-val">Instant</div></div>
                </div>
                <button class="plate-buy-btn">BUY BUNDLE</button>
            `;
            card.onclick = () => {
                document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selG = d.g; selP = d.p;
                document.getElementById('orderForm').style.display = 'block';
                document.getElementById('orderLabel').innerText = `Buying ${d.g} ${net}`;
                window.scrollTo({ top: document.getElementById('orderForm').offsetTop - 100, behavior: 'smooth' });
            };
            grid.appendChild(card);
        });
    }

    function handlePayment() {
        const phone = document.getElementById('recipientPhone').value;
        const email = document.getElementById('buyerEmail').value;
        if(phone.length < 10) return alert("Enter a valid phone number.");
        if(!email.includes('@')) return alert("Enter a valid email for your receipt.");
        
        const confirmed = confirm("⚠️ FINAL VERIFICATION:\n\nIs " + phone + " correct?\n\nWrong numbers have NO REFUNDS. Proceed to payment?");
        
        if(confirmed) {
            let fee = selP < 30 ? 0.3 : 0.9;
            let total = selP + fee;

            const handler = PaystackPop.setup({
                key: 'pk_live_90305707d30b6282979eac837bbbc9509da579af',
                email: email,
                amount: Math.round(total * 100),
                currency: 'GHS',
                callback: (response) => {
                    window.location.href = `https://wa.me/233248745662?text=ORDER: ${selG} ${currentNet} to ${phone}. Ref: ${response.reference}`;
                }
            });
            handler.openIframe();
        }
    }

    function switchTab(net) {
        currentNet = net.toUpperCase();
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('mtnGrid').style.display = net === 'mtn' ? 'grid' : 'none';
        document.getElementById('atGrid').style.display = net === 'at' ? 'grid' : 'none';
    }
</script>
</body>
</html>
