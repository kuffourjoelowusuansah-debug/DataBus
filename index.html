<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Iconic Store</title>
    <script src="https://js.paystack.co/v2/inline.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --accent: #FF3B30; 
            --accent-grad: linear-gradient(135deg, #FF3B30 0%, #FF9500 100%);
            --glass: rgba(255, 255, 255, 0.05); --success: #2ecc71;
            --bundle-bg: #1a1f26; --bundle-border: #2d3748;
        }

        .light-mode {
            --bg: #f8f9fa; --card: #ffffff; --text: #121212; --glass: rgba(0, 0, 0, 0.05);
            --bundle-bg: #ffffff; --bundle-border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* VIRTUE PANEL (GRADIENT) */
        .features-box { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 450px;
            background: var(--accent-grad); padding: 15px; border-radius: 20px; margin-bottom: 20px; 
            color: white; box-shadow: 0 10px 20px rgba(255, 59, 48, 0.2);
        }
        .feature-item { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .feature-item h4 { margin: 0; font-size: 13px; font-weight: 800; }

        .app-container { background: var(--card); width: 100%; max-width: 450px; border-radius: 35px; padding: 25px; box-sizing: border-box; border: 1px solid var(--glass); }
        .logo { font-weight: 900; font-size: 22px; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* DATA PLATES */
        .bundle-grid { display: flex; flex-direction: column; gap: 15px; }
        .bundle-card { 
            background: var(--accent-grad); border-radius: 22px; padding: 20px;
            display: grid; grid-template-columns: 1fr 80px; grid-template-rows: auto auto auto;
            cursor: pointer; transition: 0.2s; color: white; box-shadow: 0 8px 20px rgba(255, 59, 48, 0.2);
        }
        .bundle-card.selected { border: 3px solid #fff; }
        .plate-amt { font-size: 34px; font-weight: 900; grid-row: 2; }
        .plate-logo { width: 60px; height: 60px; border-radius: 12px; grid-column: 2; grid-row: 2; background: white; padding: 2px; }
        .plate-price { font-size: 24px; font-weight: 800; grid-row: 3; }
        .plate-buy-btn { grid-column: 2; grid-row: 3; background: #000; color: #fff; border: none; padding: 8px; border-radius: 10px; font-weight: 800; }

        /* MODALS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100000; display: none; flex-direction: column; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid var(--accent); }
        
        .large-input { width: 100%; padding: 20px; border-radius: 15px; border: 2px solid var(--accent); background: var(--glass); color: var(--text); font-size: 20px; text-align: center; margin-bottom: 15px; box-sizing: border-box; }
        .pay-btn { width: 100%; background: var(--accent-grad); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; }

        .tabs-container { display: flex; background: var(--glass); padding: 5px; border-radius: 15px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; background: none; color: var(--text); font-weight: 800; }
        .tab-btn.active { background: var(--accent-grad); color: white; }

        #sideMenu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--card); z-index: 50000; transition: 0.4s; padding: 30px 20px; border-left: 2px solid var(--accent); }
        #sideMenu.active { right: 0; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 12px; background: var(--glass); cursor: pointer; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div id="sideMenu">
    <h3 style="color:var(--accent)">JOELDATA</h3>
    <div class="menu-item" onclick="showModal('work')"><i data-lucide="briefcase"></i> Work With Us</div>
    <div class="menu-item" onclick="showReceipt()"><i data-lucide="file-text"></i> Last Receipt</div>
    <div class="menu-item" onclick="showModal('help')"><i data-lucide="help-circle"></i> How to Buy/Pay</div>
    <div class="menu-item" onclick="showModal('terms')"><i data-lucide="shield"></i> Terms & Policy</div>
    <div class="menu-item" onclick="toggleTheme()" style="margin-top:20px"><i data-lucide="refresh-cw"></i> Change Theme</div>
    <button class="pay-btn" onclick="toggleMenu()" style="margin-top:20px; background: #ef4444;">CLOSE</button>
</div>

<div id="genericModal" class="modal">
    <div class="modal-content" id="modalBody"></div>
    <button class="pay-btn" style="margin-top:20px" onclick="closeModal()">CLOSE</button>
</div>

<div class="header" style="width:100%; max-width:450px; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <div class="logo">JOELDATA.</div>
    <button onclick="toggleMenu()" style="background:var(--glass); border:none; color:var(--text); padding:10px; border-radius:10px;"><i data-lucide="menu"></i></button>
</div>

<div class="features-box">
    <div class="feature-item"><i data-lucide="zap"></i><div><h4>Fast Delivery</h4><p>Instant Activation</p></div></div>
    <div class="feature-item"><i data-lucide="shield-check"></i><div><h4>Secured</h4><p>100% Encrypted</p></div></div>
    <div class="feature-item"><i data-lucide="headphones"></i><div><h4>24/7 Support</h4><p>Always Online</p></div></div>
    <div class="feature-item"><i data-lucide="trending-down"></i><div><h4>Affordable</h4><p>Best Rates</p></div></div>
</div>

<div class="app-container">
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('mtn')">MTN</button>
        <button class="tab-btn" onclick="switchTab('at')">AT</button>
    </div>

    <div id="mtnGrid" class="bundle-grid"></div>
    <div id="atGrid" class="bundle-grid" style="display:none;"></div>

    <div id="orderForm" style="display:none; margin-top:25px; border-top:1px solid var(--glass); padding-top:20px;">
        <h3 id="orderLabel" style="text-align:center; color:var(--accent)"></h3>
        <input type="tel" id="recipientPhone" class="large-input" placeholder="Recipient Number" maxlength="10">
        <button class="pay-btn" onclick="handlePayment()">PAY SECURELY NOW</button>
        <p style="font-size:10px; text-align:center; opacity:0.6; margin-top:10px;">By paying, you agree to our Terms & Privacy Policy.</p>
    </div>
</div>

<script>
    let currentNet = "MTN"; let selG = ""; let selP = 0;
    const mtnData = [{g:"1GB",p:5},{g:"2GB",p:10},{g:"5GB",p:25},{g:"10GB",p:50}];
    const atData = [{g:"1GB",p:4.5},{g:"2GB",p:9},{g:"5GB",p:20.5},{g:"10GB",p:40}];

    window.onload = () => {
        renderGrid('mtnGrid', mtnData, 'MTN', 'Non Expiry', 'https://upload.wikimedia.org/wikipedia/commons/a/af/MTN_Logo.svg');
        renderGrid('atGrid', atData, 'AT', '30 Days', 'https://seeklogo.com/images/A/at-ghana-logo-50953E2333-seeklogo.com.png');
        lucide.createIcons();
    };

    function renderGrid(id, data, net, exp, logo) {
        const grid = document.getElementById(id);
        data.forEach(d => {
            const card = document.createElement('div');
            card.className = 'bundle-card';
            card.innerHTML = `
                <div style="font-size:12px; font-weight:bold;">${net} • ${exp}</div>
                <div class="plate-amt">${d.g}</div>
                <img src="${logo}" class="plate-logo">
                <div class="plate-price">₵${d.p.toFixed(2)}</div>
                <button class="plate-buy-btn">BUY</button>
            `;
            card.onclick = () => {
                document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selG = d.g; selP = d.p;
                document.getElementById('orderForm').style.display = 'block';
                document.getElementById('orderLabel').innerText = `Buying ${d.g} for ₵${d.p}`;
            };
            grid.appendChild(card);
        });
    }

    function handlePayment() {
        const phone = document.getElementById('recipientPhone').value;
        if(phone.length < 10) return alert("Enter valid number");
        
        let fee = selP < 30 ? 0.3 : 0.9;
        let total = selP + fee;

        const handler = PaystackPop.setup({
            key: 'pk_live_90305707d30b6282979eac837bbbc9509da579af',
            email: 'sales@joeldata.com',
            amount: Math.round(total * 100),
            currency: 'GHS',
            callback: (response) => {
                const receipt = { date: new Date().toLocaleString(), net: currentNet, gb: selG, phone: phone, ref: response.reference, price: total };
                localStorage.setItem('lastReceipt', JSON.stringify(receipt));
                window.location.href = `https://wa.me/233248745662?text=ORDER: ${selG} ${currentNet} to ${phone}. Ref: ${response.reference}`;
            }
        });
        handler.openIframe();
    }

    function showReceipt() {
        const r = JSON.parse(localStorage.getItem('lastReceipt'));
        const body = document.getElementById('modalBody');
        if(!r) body.innerHTML = "<h2>No Receipt Found</h2><p>You haven't made a purchase yet.</p>";
        else body.innerHTML = `<h2>Last Receipt</h2><hr><p><b>Date:</b> ${r.date}</p><p><b>Network:</b> ${r.net}</p><p><b>Bundle:</b> ${r.gb}</p><p><b>Phone:</b> ${r.phone}</p><p><b>Price:</b> ₵${r.price}</p><p><b>Ref:</b> ${r.ref}</p>`;
        document.getElementById('genericModal').style.display = 'flex';
    }

    function showModal(type) {
        const body = document.getElementById('modalBody');
        if(type === 'work') {
            body.innerHTML = `<h2>Work With Us</h2><p>Join the JoelData distribution team.</p><input class="large-input" placeholder="Full Name"><input class="large-input" placeholder="Location"><button class="pay-btn" onclick="alert('Sent!')">Apply Now</button>`;
        } else if(type === 'help') {
            body.innerHTML = `<h2>How to Buy/Pay</h2><p><b>1. Select:</b> Choose your network and data bundle plate.</p><p><b>2. Number:</b> Enter the 10-digit recipient phone number.</p><p><b>3. Pay:</b> Click pay and use MoMo or Card via our secure gateway.</p>`;
        } else if(type === 'terms') {
            body.innerHTML = `<h2>Terms & Privacy</h2><p><b>Refunds:</b> No refunds on successful deliveries.</p><p><b>Privacy:</b> We never share your data or phone numbers with third parties.</p>`;
        }
        document.getElementById('genericModal').style.display = 'flex';
    }

    function switchTab(net) {
        currentNet = net.toUpperCase();
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('mtnGrid').style.display = net === 'mtn' ? 'flex' : 'none';
        document.getElementById('atGrid').style.display = net === 'at' ? 'flex' : 'none';
    }

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
    function closeModal() { document.getElementById('genericModal').style.display = 'none'; }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
</script>
</body>
</html>
