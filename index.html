<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Bus | Liquid Glass Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://js.paystack.co/v2/inline.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Poppins', 'sans-serif'] },
            colors: {
              brand: {
                sunGold: '#FFF2CC',   /* Lightened Sun Gold for a softer feel */
                lime: '#94CF76',
                tangerine: '#FF9900',
                plum: '#6A4374',
                plumDark: '#3D2542',
                sienna: '#A15142',
                mtn: '#FFD700',
                at: '#5D5FEF',
                telecel: '#FF3B3B'
              }
            }
          }
        }
      }
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top left, #FFF2CC 0%, #FFE5A0 100%);
            font-family: 'Poppins', sans-serif; 
            color: #3D2542; 
            min-height: 100vh;
        }

        /* Glassmorphism Base */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(61, 37, 66, 0.08);
        }

        /* Liquid UI Effects */
        .liquid-btn {
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        .liquid-btn:active { transform: scale(0.95) translateY(2px); }

        /* Saturated Network Glows */
        .glow-mtn { box-shadow: 0 10px 30px -10px rgba(255, 215, 0, 0.5); }
        .glow-at { box-shadow: 0 10px 30px -10px rgba(93, 95, 239, 0.5); }
        .glow-telecel { box-shadow: 0 10px 30px -10px rgba(255, 59, 59, 0.5); }

        .hidden-view { display: none !important; }

        /* Liquid Flow Animation */
        @keyframes flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .liquid-bg {
            background: linear-gradient(-45deg, #FF9900, #6A4374, #94CF76, #A15142);
            background-size: 400% 400%;
            animation: flow 15s ease infinite;
        }
    </style>
</head>
<body class="max-w-md mx-auto relative">

    <div id="homeView">
        <header class="p-6 flex justify-between items-center sticky top-0 z-50 backdrop-blur-md">
            <button onclick="handleAuthClick()" id="authBtn" class="glass-card text-[10px] font-black px-5 py-2.5 rounded-2xl flex items-center gap-2 tracking-widest text-brand-plumDark">
                <i data-lucide="user" class="w-4 h-4"></i> LOGIN
            </button>
            <div class="text-center">
                <span class="text-sm font-black italic uppercase tracking-tighter text-brand-plumDark">DATA<span class="text-brand-tangerine">BUS</span></span>
            </div>
            <button class="glass-card p-2.5 rounded-2xl">
                <i data-lucide="bell" class="w-5 h-5 text-brand-plum"></i>
            </button>
        </header>

        <main class="p-6 space-y-8">
            <div class="bg-brand-lime rounded-[2.5rem] p-8 shadow-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-white/20 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                <div class="relative z-10">
                    <p id="userName" class="text-[11px] font-black uppercase tracking-[0.2em] text-brand-plumDark/70">Loading...</p>
                    <h1 class="text-4xl font-black tracking-tighter mt-4 text-brand-plumDark">₵ <span id="totalSpent">0.00</span></h1>
                    <p class="text-[9px] font-bold uppercase opacity-60">Total Transit Investment</p>
                </div>
                <button class="mt-6 w-full bg-brand-plumDark text-white py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2">
                    <span class="w-2 h-2 bg-brand-lime rounded-full animate-pulse"></span> 42 Students Online
                </button>
            </div>

            <section class="grid grid-cols-2 gap-4">
                <button onclick="showTickets()" class="glass-card liquid-btn p-6 rounded-[2rem] flex flex-col items-center gap-3">
                    <div class="bg-brand-plum text-white p-4 rounded-2xl shadow-lg"><i data-lucide="zap"></i></div>
                    <span class="text-[11px] font-black uppercase tracking-widest">Buy Data</span>
                </button>
                <button class="glass-card liquid-btn p-6 rounded-[2rem] flex flex-col items-center gap-3">
                    <div class="bg-brand-tangerine text-white p-4 rounded-2xl shadow-lg"><i data-lucide="gift"></i></div>
                    <span class="text-[11px] font-black uppercase tracking-widest">Offers</span>
                </button>
                <button onclick="showHistory()" class="glass-card liquid-btn p-6 rounded-[2rem] flex flex-col items-center gap-3">
                    <div class="bg-brand-sienna text-white p-4 rounded-2xl shadow-lg"><i data-lucide="history"></i></div>
                    <span class="text-[11px] font-black uppercase tracking-widest text-center">History</span>
                </button>
                <button class="glass-card liquid-btn p-6 rounded-[2rem] flex flex-col items-center gap-3">
                    <div class="bg-brand-plumDark text-brand-sunGold p-4 rounded-2xl shadow-lg"><i data-lucide="help-circle"></i></div>
                    <span class="text-[11px] font-black uppercase tracking-widest">Support</span>
                </button>
            </section>

            <section class="space-y-4 pb-20">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] px-2 text-brand-plumDark/50">Why Data Bus?</h3>
                <div class="bg-brand-tangerine p-1 rounded-[2.5rem]">
                    <div class="glass-card p-6 rounded-[2.4rem] flex items-center gap-4">
                        <div class="bg-brand-plumDark text-white p-3 rounded-xl"><i data-lucide="zap"></i></div>
                        <p class="font-bold text-sm">Instant Liquid Delivery</p>
                    </div>
                </div>
                <div class="bg-brand-plum p-1 rounded-[2.5rem]">
                    <div class="glass-card p-6 rounded-[2.4rem] flex items-center gap-4">
                        <div class="bg-white/20 text-brand-plumDark p-3 rounded-xl"><i data-lucide="shield"></i></div>
                        <p class="font-bold text-sm">Military Grade Security</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="ticketsView" class="hidden-view p-6">
        <header class="flex items-center gap-4 mb-8">
            <button onclick="showHome()" class="glass-card p-3 rounded-2xl"><i data-lucide="arrow-left"></i></button>
            <h1 class="text-2xl font-black tracking-tight">Select Network</h1>
        </header>
        <div class="space-y-6">
            <div onclick="showBundles('MTN')" class="glass-card glow-mtn p-6 rounded-[2.5rem] flex items-center justify-between border-l-8 border-brand-mtn cursor-pointer">
                <span class="text-xl font-black">MTN GHANA</span>
                <i data-lucide="chevron-right" class="text-brand-mtn"></i>
            </div>
            <div onclick="showBundles('TELECEL')" class="glass-card glow-telecel p-6 rounded-[2.5rem] flex items-center justify-between border-l-8 border-brand-telecel cursor-pointer">
                <span class="text-xl font-black">TELECEL</span>
                <i data-lucide="chevron-right" class="text-brand-telecel"></i>
            </div>
            <div onclick="showBundles('AT')" class="glass-card glow-at p-6 rounded-[2.5rem] flex items-center justify-between border-l-8 border-brand-at cursor-pointer">
                <span class="text-xl font-black">AT GHANA</span>
                <i data-lucide="chevron-right" class="text-brand-at"></i>
            </div>
        </div>
    </div>

    <div id="bundlesView" class="hidden-view p-6">
        <header class="flex items-center gap-4 mb-8">
            <button onclick="showTickets()" class="glass-card p-3 rounded-2xl"><i data-lucide="arrow-left"></i></button>
            <h1 id="bundleTitle" class="text-2xl font-black tracking-tight">Bundles</h1>
        </header>
        <div id="bundleList" class="space-y-8"></div>
    </div>

    <div id="checkoutView" class="hidden-view p-6">
        <div class="glass-card p-8 rounded-[3rem] space-y-6 border-brand-tangerine/30">
            <div class="flex justify-between items-center">
                <h2 id="checkBundle" class="text-5xl font-black tracking-tighter">0GB</h2>
                <span id="checkNet" class="text-[10px] font-black px-4 py-1 bg-brand-plumDark text-white rounded-full">NETWORK</span>
            </div>
            <div class="space-y-2 border-y border-brand-plumDark/5 py-6">
                <div class="flex justify-between font-bold"><span>Price</span><span id="checkPrice">₵0.00</span></div>
                <div class="flex justify-between text-xs opacity-60"><span>Fee</span><span id="checkFee">₵0.00</span></div>
                <div class="flex justify-between text-2xl font-black text-brand-tangerine pt-2"><span>Total</span><span id="checkTotal">₵0.00</span></div>
            </div>
            <input type="tel" id="recipientPhone" class="w-full glass-card p-5 rounded-2xl font-black outline-none focus:ring-2 ring-brand-tangerine" placeholder="024XXXXXXX">
            <button onclick="handlePayment()" class="w-full liquid-bg py-5 rounded-2xl text-white font-black uppercase tracking-widest shadow-xl">Pay Now</button>
        </div>
    </div>

    <div id="historyView" class="hidden-view p-6">
        <header class="flex items-center gap-4 mb-8">
            <button onclick="showHome()" class="glass-card p-3 rounded-2xl"><i data-lucide="arrow-left"></i></button>
            <h1 class="text-2xl font-black">Orders</h1>
        </header>
        <div id="historyList" class="space-y-4"></div>
    </div>

    <script>
        // Use your existing Firebase logic here
        const firebaseConfig = { apiKey: "AIzaSyCqg3E9tuKRcEnq2DdP6FjtG0LqnAjCHfM", authDomain: "joeldata-25d06.firebaseapp.com", projectId: "joeldata-25d06", storageBucket: "joeldata-25d06.firebasestorage.app", messagingSenderId: "555857869458", appId: "1:555857869458:web:db96a97fca5983b142044b" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentNet = "MTN"; let selG = ""; let selP = 0;
        function refreshIcons() { lucide.createIcons(); }

        const dataSets = {
            MTN: { colors: 'from-brand-mtn to-yellow-600', text: 'text-brand-plumDark', prices: [{gb:"1 GB", p:"5"}, {gb:"5 GB", p:"25"}, {gb:"10 GB", p:"50"}] },
            TELECEL: { colors: 'from-brand-telecel to-red-900', text: 'text-white', prices: [{gb:"10 GB", p:"40"}, {gb:"20 GB", p:"80"}, {gb:"50 GB", p:"200"}] },
            AT: { colors: 'from-brand-at to-blue-900', text: 'text-white', prices: [{gb:"5 GB", p:"20.5"}, {gb:"10 GB", p:"40"}, {gb:"25 GB", p:"100"}] }
        };

        function showHome() { hideAll(); document.getElementById('homeView').classList.remove('hidden-view'); refreshIcons(); }
        function showTickets() { hideAll(); document.getElementById('ticketsView').classList.remove('hidden-view'); refreshIcons(); }
        function showHistory() { hideAll(); document.getElementById('historyView').classList.remove('hidden-view'); renderHistory(); }
        
        function showBundles(net) {
            hideAll(); currentNet = net;
            const set = dataSets[net];
            const list = document.getElementById('bundleList');
            list.innerHTML = '';
            set.prices.forEach(item => {
                list.innerHTML += `
                    <div class="glass-card rounded-[2.5rem] overflow-hidden">
                        <div class="bg-gradient-to-r ${set.colors} p-6 flex justify-between items-center ${set.text}">
                            <span class="font-black tracking-widest uppercase text-[10px]">${net} LIQUID DATA</span>
                            <i data-lucide="droplets" class="w-5 h-5"></i>
                        </div>
                        <div class="p-8 text-center space-y-4">
                            <h2 class="text-6xl font-black tracking-tighter text-brand-plumDark">${item.gb.split(' ')[0]}<span class="text-xl">GB</span></h2>
                            <button onclick="openCheckout('${item.gb}', ${item.p})" class="w-full bg-brand-plumDark text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg">₵${item.p} • Select</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('bundlesView').classList.remove('hidden-view');
            refreshIcons();
        }

        function openCheckout(gb, p) {
            hideAll(); selG = gb; selP = p;
            document.getElementById('checkBundle').innerText = gb;
            document.getElementById('checkNet').innerText = currentNet;
            document.getElementById('checkPrice').innerText = `₵${p}`;
            document.getElementById('checkTotal').innerText = `₵${(p + 0.5).toFixed(2)}`;
            document.getElementById('checkoutView').classList.remove('hidden-view');
            refreshIcons();
        }

        function hideAll() {
            ['homeView', 'ticketsView', 'bundlesView', 'checkoutView', 'historyView'].forEach(id => document.getElementById(id).classList.add('hidden-view'));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userName').innerText = `Welcome, ${user.displayName.split(' ')[0]}`;
                document.getElementById('authBtn').innerHTML = `<i data-lucide="log-out"></i> LOGOUT`;
            } else {
                document.getElementById('userName').innerText = `Welcome, Joel`;
            }
            refreshIcons();
        });

        function handleAuthClick() { if (auth.currentUser) auth.signOut(); else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        
        showHome();
    </script>
</body>
</html>
