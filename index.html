<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Iconic Store</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://js.paystack.co/v2/inline.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --accent: #FF3B30; 
            --accent-grad: linear-gradient(135deg, #FF3B30 0%, #FF9500 100%);
            --glass: rgba(255, 255, 255, 0.05); --success: #2ecc71;
            --mtn-grad: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
            --at-grad: linear-gradient(135deg, #33C1FF 0%, #4B0082 100%);
        }
        .light-mode { --bg: #f8f9fa; --card: #ffffff; --text: #121212; --glass: rgba(0, 0, 0, 0.05); }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 1200px; padding: 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .logo { font-weight: 900; letter-spacing: -1.5px; font-size: 26px; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .app-container { width: 100%; max-width: 1200px; padding: 0 25px 50px 25px; box-sizing: border-box; }
        
        /* SCROLLABLE SIDE MENU */
        #sideMenu { 
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%; 
            background: var(--card); z-index: 50000; transition: 0.4s; 
            padding: 40px 20px; border-left: 2px solid var(--accent);
            overflow-y: auto; /* Adds the scroll bar */
            box-sizing: border-box;
        }
        #sideMenu.active { right: 0; }
        .menu-item { padding: 18px; margin-bottom: 12px; border-radius: 15px; background: var(--glass); cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 700; }
        
        /* GRID & CARDS */
        .features-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: var(--accent-grad); padding: 25px; border-radius: 25px; margin-bottom: 30px; color: white; box-shadow: 0 15px 30px rgba(255, 59, 48, 0.2); }
        .features-box.mtn-theme { background: var(--mtn-grad); }
        .features-box.at-theme { background: var(--at-grad); }
        .feature-item { display: flex; align-items: center; gap: 12px; }
        .feature-item h4 { margin: 0; font-size: 14px; }
        .feature-item p { margin: 2px 0 0; font-size: 11px; }

        .tabs-container { display: inline-flex; background: var(--glass); padding: 6px; border-radius: 20px; margin-bottom: 30px; }
        .tab-btn { padding: 12px 30px; border: none; border-radius: 15px; background: none; color: var(--text); font-weight: 800; cursor: pointer; }
        .tab-btn.active { background: var(--accent-grad); color: #fff; }
        
        .bundle-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; width: 100%; }
        .bundle-card { border-radius: 25px; padding: 25px; display: flex; flex-direction: column; gap: 15px; cursor: pointer; transition: 0.3s ease; color: white; background: var(--glass); }
        #mtnGrid .bundle-card { background: var(--mtn-grad); }
        #atGrid .bundle-card { background: var(--at-grad); }
        
        .plate-header { display: flex; justify-content: space-between; align-items: center; }
        .plate-amt { font-size: 48px; font-weight: 900; }
        .plate-logo { width: 50px; height: 50px; border-radius: 12px; background: white; padding: 4px; object-fit: contain; }
        
        .plate-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 15px; font-size: 12px; }
        .plate-buy-btn { width: 100%; background: #000; color: #fff; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; }

        /* MODALS & FORMS */
        #orderForm { max-width: 500px; margin: 50px auto; background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid var(--accent); display: none; }
        .large-input { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid var(--accent); background: var(--glass); color: var(--text); font-size: 18px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .pay-btn { width: 100%; background: var(--accent-grad); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: 800; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--accent); width: 100%; max-width: 500px; }

        .purchase-toast { position: fixed; bottom: 20px; left: 20px; background: var(--card); border: 1px solid var(--accent); padding: 12px 20px; border-radius: 15px; display: flex; align-items: center; gap: 12px; z-index: 999999; transform: translateY(200%); transition: 0.5s; }
        .purchase-toast.show { transform: translateY(0); }
    </style>
</head>
<body>

<div id="toast" class="purchase-toast">
    <img id="toastLogo" src="" style="width:30px">
    <div id="toastMsg" style="font-size:12px"></div>
</div>

<div id="sideMenu">
    <h3 style="color:var(--accent); margin-top: 0;">JOELDATA</h3>
    <div class="menu-item" id="authBtn" onclick="handleAuthClick()"><i data-lucide="user"></i> Sign In</div>
    <div class="menu-item" id="profileBtn" onclick="showModal('profile')" style="display:none;"><i data-lucide="layout-dashboard"></i> My Dashboard</div>
    <div class="menu-item" onclick="showModal('work')"><i data-lucide="briefcase"></i> Work With Us</div>
    <div class="menu-item" onclick="showModal('help')"><i data-lucide="help-circle"></i> How to Buy/Pay</div>
    <div class="menu-item" onclick="showModal('terms')"><i data-lucide="shield"></i> Terms & Policy</div>
    <div class="menu-item" onclick="toggleTheme()" style="margin-top:20px"><i data-lucide="refresh-cw"></i> Change Theme</div>
    <button class="pay-btn" onclick="toggleMenu()" style="margin-top:20px; background: #ef4444; font-size: 14px; padding: 15px;">CLOSE MENU</button>
</div>

<div id="genericModal" class="modal">
    <div class="modal-content">
        <div id="modalBody"></div>
        <button class="pay-btn" style="margin-top:20px" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<header class="header">
    <div class="logo">JOELDATA.</div>
    <button onclick="toggleMenu()" style="background:var(--accent-grad); border:none; color:white; padding:12px 20px; border-radius:12px; font-weight:bold; cursor:pointer;">MENU</button>
</header>

<main class="app-container">
    <div id="mainFeatures" class="features-box mtn-theme">
        <div class="feature-item"><i data-lucide="zap"></i><div><h4>Fast Delivery</h4><p>Instant Activation</p></div></div>
        <div class="feature-item"><i data-lucide="shield-check"></i><div><h4>Secured</h4><p>100% Encrypted</p></div></div>
    </div>

    <div style="text-align: center;">
        <div class="tabs-container">
            <button id="mtnTab" class="tab-btn active" onclick="switchTab('mtn')">MTN</button>
            <button id="atTab" class="tab-btn" onclick="switchTab('at')">AT Ghana</button>
        </div>
    </div>

    <div id="mtnGrid" class="bundle-grid"></div>
    <div id="atGrid" class="bundle-grid" style="display:none;"></div>

    <div id="orderForm">
        <h2 id="orderLabel" style="text-align:center; color:var(--accent);"></h2>
        <input type="tel" id="recipientPhone" class="large-input" placeholder="Phone (02XXXXXXXX)" maxlength="10">
        <input type="email" id="buyerEmail" class="large-input" placeholder="Your Email">
        <button class="pay-btn" onclick="handlePayment()">CONFIRM & PAY</button>
    </div>
</main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCqg3E9tuKRcEnq2DdP6FjtG0LqnAjCHfM",
        authDomain: "joeldata-25d06.firebaseapp.com",
        projectId: "joeldata-25d06",
        storageBucket: "joeldata-25d06.firebasestorage.app",
        messagingSenderId: "555857869458",
        appId: "1:555857869458:web:db96a97fca5983b142044b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentNet = "MTN"; let selG = ""; let selP = 0;
    const mtnLogo = 'https://upload.wikimedia.org/wikipedia/commons/a/af/MTN_Logo.svg';
    const atLogo = 'https://iconape.com/wp-content/files/ov/371212/svg/371212.svg'; 

    const mtnData = [{g:"1 GB", p:5}, {g:"2 GB", p:10}, {g:"5 GB", p:25}, {g:"10 GB", p:50}];
    const atData = [{g:"1GB",p:4.5}, {g:"5GB",p:20}, {g:"10GB",p:40}];

    window.onload = () => {
        renderGrid('mtnGrid', mtnData, 'MTN', 'Non Expiry', mtnLogo);
        renderGrid('atGrid', atData, 'AT', '30 Days', atLogo);
        lucide.createIcons();
    };

    auth.onAuthStateChanged(user => {
        const btn = document.getElementById('authBtn');
        const pBtn = document.getElementById('profileBtn');
        if (user) {
            btn.innerHTML = `<i data-lucide="log-out"></i> Log Out`;
            pBtn.style.display = 'flex';
            document.getElementById('buyerEmail').value = user.email;
        } else {
            btn.innerHTML = `<i data-lucide="user"></i> Sign In`;
            pBtn.style.display = 'none';
        }
        lucide.createIcons();
    });

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
    function closeModal() { document.getElementById('genericModal').style.display = 'none'; }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    function handleAuthClick() { 
        if(auth.currentUser) { auth.signOut(); toggleMenu(); } 
        else { showModal('login'); } 
    }

    function signInGoogle() {
        const p = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(p).then(() => { closeModal(); toggleMenu(); });
    }

    function renderGrid(id, data, net, exp, logo) {
        const grid = document.getElementById(id);
        data.forEach(d => {
            const card = document.createElement('div');
            card.className = 'bundle-card';
            card.innerHTML = `<div class="plate-header"><div class="plate-amt">${d.g}</div><img src="${logo}" class="plate-logo"></div><div class="plate-details"><div class="detail-item"><span>Price</span><b>₵${d.p}</b></div><div class="detail-item"><span>Status</span><b style="color:#2ecc71">Active</b></div></div><button class="plate-buy-btn">BUY</button>`;
            card.onclick = () => {
                selG = d.g; selP = d.p;
                document.getElementById('orderForm').style.display = 'block';
                document.getElementById('orderLabel').innerText = `Buying ${d.g} ${net}`;
                window.scrollTo({ top: document.getElementById('orderForm').offsetTop - 50, behavior: 'smooth' });
            };
            grid.appendChild(card);
        });
    }

    function switchTab(net) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(net === 'mtn') {
            document.getElementById('mtnTab').classList.add('active');
            document.getElementById('mtnGrid').style.display = 'grid';
            document.getElementById('atGrid').style.display = 'none';
        } else {
            document.getElementById('atTab').classList.add('active');
            document.getElementById('atGrid').style.display = 'grid';
            document.getElementById('mtnGrid').style.display = 'none';
        }
    }

    async function showModal(type) {
        const body = document.getElementById('modalBody');
        document.getElementById('genericModal').style.display = 'flex';
        
        if(type === 'profile') {
            const u = auth.currentUser;
            body.innerHTML = '<h3>Reading Records...</h3>';
            // REMOVED orderBy TO PREVENT LOADING FREEZE
            const snap = await db.collection('orders').where('email', '==', u.email).get();
            let total = 0; let list = '';
            snap.forEach(d => { 
                total += d.data().amount; 
                list += `<div style="background:var(--glass); padding:10px; border-radius:10px; margin-bottom:10px; font-size:12px;"><b>${d.data().bundle}</b> - ₵${d.data().amount}</div>`; 
            });
            body.innerHTML = `<div style="text-align:center"><img src="${u.photoURL}" style="width:60px; border-radius:50%;"><h2 style="margin:5px 0">JoelData Stats</h2><div style="background:var(--accent-grad); padding:15px; border-radius:15px; color:white; margin:15px 0"><span>TOTAL SPENT</span><h1 style="margin:0">₵${total.toFixed(2)}</h1></div></div><h4 style="margin-bottom:10px">History</h4><div style="max-height:150px; overflow-y:auto">${list || 'No orders.'}</div>`;
        } else if(type === 'login') {
            body.innerHTML = `<h2>Sign In</h2><button class="pay-btn" onclick="signInGoogle()">GOOGLE SIGN IN</button>`;
        } else if(type === 'work') {
            body.innerHTML = `<h2>Vendor</h2><p>Contact Joel to sell data.</p><button class="pay-btn" onclick="window.location.href='https://wa.me/233248745662'">WHATSAPP</button>`;
        }
        lucide.createIcons();
    }

    function handlePayment() {
        const phone = document.getElementById('recipientPhone').value;
        const email = document.getElementById('buyerEmail').value;
        if(phone.length < 10) return alert("Error: Invalid Phone");
        const handler = PaystackPop.setup({
            key: 'pk_live_90305707d30b6282979eac837bbbc9509da579af',
            email: email, amount: Math.round(selP * 100), currency: 'GHS',
            callback: (res) => {
                if(auth.currentUser) {
                    db.collection('orders').add({
                        email: auth.currentUser.email,
                        amount: selP,
                        bundle: `${selG} ${currentNet}`,
                        ref: res.reference,
                        date: new Date().toLocaleDateString()
                    });
                }
                window.location.href = `https://wa.me/233248745662?text=Paid for ${selG} to ${phone}`;
            }
        });
        handler.openIframe();
    }
</script>
</body>
</html>
