<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Iconic Store</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --accent: #FFCC00;
            --mtn-blue: #003399;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #25D366;
        }

        .light-mode {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #121212;
            --glass: rgba(0, 0, 0, 0.05);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.4s; }
        
        .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-weight: 900; letter-spacing: -1.5px; font-size: 22px; color: var(--accent); }
        .theme-btn { background: var(--glass); border: 1px solid var(--glass); color: var(--text); padding: 10px 15px; border-radius: 50px; cursor: pointer; font-size: 12px; }

        .app-container { background: var(--card); width: 100%; max-width: 400px; border-radius: 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); padding: 25px; box-sizing: border-box; border: 1px solid var(--glass); }
        
        .bundle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .bundle-card { border: 1px solid var(--glass); padding: 20px; border-radius: 25px; text-align: center; cursor: pointer; background: var(--glass); position: relative; transition: 0.3s; }

        .stock-tag { font-size: 9px; text-transform: uppercase; font-weight: bold; padding: 4px 8px; border-radius: 10px; position: absolute; top: 10px; right: 10px; }
        .in-stock { background: rgba(37, 211, 102, 0.1); color: var(--success); }
        .low-stock { background: rgba(255, 204, 0, 0.1); color: var(--accent); }

        .bundle-card.selected { border: 2px solid var(--mtn-blue) !important; background: var(--accent) !important; transform: scale(1.03); }
        .bundle-card.selected strong, .bundle-card.selected span { color: #000 !important; }
        .bundle-card strong { display: block; font-size: 26px; margin-top: 10px; color: var(--accent); }
        
        /* THE FORM SECTION - FIXED */
        #orderForm { margin-top: 25px; display: none; padding-top: 20px; border-top: 1px solid var(--glass); }
        
        .copy-box { background: var(--mtn-blue); color: white; padding: 20px; border-radius: 25px; text-align: center; margin-bottom: 15px; }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border: 1px solid var(--glass); border-radius: 20px; background: var(--glass); color: var(--text); font-size: 16px; text-align: center; box-sizing: border-box; outline: none; }
        
        .pay-btn { width: 100%; background: var(--accent); color: black; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; }

        /* REVIEWS */
        .reviews-section { width: 100%; max-width: 400px; margin-top: 40px; }
        .review-card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid var(--glass); margin-bottom: 10px; }
        
        .channel-btn { width: 100%; max-width: 400px; background: var(--success); color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 18px; border-radius: 25px; font-weight: bold; margin-top: 20px; }
        .footer { margin-top: 40px; text-align: center; font-size: 12px; opacity: 0.5; padding-bottom: 40px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">JOELDATA.</div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeLink">🌙 DARK MODE</button>
</div>

<div class="app-container">
    <div class="bundle-grid" id="bundleContainer"></div>
    
    <div id="orderForm">
        <div class="copy-box">
            <span style="font-size:11px; opacity:0.7">1. COPY MOMO NUMBER</span><br>
            <strong style="font-size: 22px;">0248745662</strong><br>
            <button onclick="copyMyNumber()" style="margin-top:12px; background:white; border:none; padding:8px 20px; border-radius:15px; font-weight:bold; cursor:pointer;">COPY NOW</button>
        </div>
        
        <input type="tel" id="recipientPhone" placeholder="Recipient Number (024...)" maxlength="10">
        
        <button class="pay-btn" onclick="handlePayment()">2. CONFIRM & PAY</button>
    </div>
</div>

<a href="https://whatsapp.com/channel/0029Vb80VO3Bfxnx4pIYb11c" class="channel-btn">Join Official Channel 📢</a>

<div class="reviews-section">
    <h3 style="color:var(--accent); text-align:center;">User Reviews ⭐</h3>
    <div id="reviewList">
         <div class="review-card"><b>Emmanuel</b><p>"Fast service, love it!"</p></div>
    </div>
</div>

<div class="footer">
    &copy; 2026 JOELDATA SERVICES GHANA
</div>

<script>
    const momoNumber = "0248745662"; 
    let currentOrder = { gb: 0, price: 0 };

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        document.getElementById('themeLink').innerText = document.body.classList.contains('light-mode') ? "🌙 DARK MODE" : "☀️ LIGHT MODE";
    }

    const container = document.getElementById('bundleContainer');
    for (let gb = 1; gb <= 10; gb++) {
        let price = (gb * 5) + 1; 
        const isLow = gb > 8;
        const card = document.createElement('div');
        card.className = 'bundle-card';
        card.innerHTML = `<div class="stock-tag ${isLow ? 'low-stock' : 'in-stock'}">${isLow ? 'Low' : 'In Stock'}</div><strong>${gb}GB</strong><span>${price} GHS</span>`;
        
        card.onclick = () => {
            // Vibrate and select
            if (navigator.vibrate) navigator.vibrate(40);
            document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            
            // SHOW THE HIDDEN FORM
            currentOrder = { gb, price };
            document.getElementById('orderForm').style.display = 'block';
            
            // Scroll to the form
            window.scrollTo({ top: 300, behavior: 'smooth' });
        };
        container.appendChild(card);
    }

    function copyMyNumber() {
        navigator.clipboard.writeText(momoNumber);
        alert("Number Copied! Dial *170# to pay.");
    }

    function handlePayment() {
        const targetNumber = document.getElementById('recipientPhone').value;
        if (targetNumber.length < 10) { alert("Invalid number"); return; }
        
        // Open Dialer
        window.location.href = `tel:*170%23`;
        
        // Send to WhatsApp
        setTimeout(() => {
            window.location.href = `https://wa.me/233248745662?text=ORDER: ${currentOrder.gb}GB for ${targetNumber}`;
        }, 5000);
    }
</script>
</body>
</html>
