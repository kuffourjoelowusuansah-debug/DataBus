<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLink Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #0d1b2a; /* Exact background deep blue */
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* --- Header Section --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
        }

        .header-btns {
            display: flex;
            gap: 10px;
        }

        .icon-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            cursor: pointer;
        }

        .btn-yellow { background-color: #fce863; color: #000; font-size: 18px; }
        .btn-blue { background-color: #4eb1d9; color: #fff; font-size: 18px; }

        /* --- Search Row --- */
        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-bar {
            flex: 1;
            background-color: #1e3a5a;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: #fff;
            padding: 12px 10px;
            outline: none;
            width: 100%;
        }

        .btn-filter {
            width: 45px;
            height: 45px;
            background-color: #fce863;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Main Hero Card --- */
        .hero-card {
            background-color: #fce863;
            border-radius: 35px; /* High rounding to match reference */
            padding: 25px;
            color: #1a1a1a;
            margin-bottom: 30px;
            position: relative;
        }

        .student-badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(0,0,0,0.08);
            padding: 8px 14px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .hero-card h3 {
            font-size: 14px;
            font-weight: 700;
            color: #555;
            margin-bottom: 5px;
        }

        .main-value {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .live-info {
            line-height: 1.4;
        }

        .live-tag {
            background-color: #1a3a3a;
            color: #4ade80;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 5px;
        }

        .no-pass-text {
            font-size: 11px;
            font-weight: 600;
            color: #666;
        }

        .btn-details {
            background-color: #1a1a1a;
            color: white;
            padding: 12px 22px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
        }

        /* --- Shortcut Grid --- */
        .shortcut-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .grid-item {
            background-color: #1e3a5a;
            border-radius: 20px;
            padding: 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .grid-item span.icon {
            color: #fce863;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Hi, Joel!</h1>
        <div class="header-btns">
            <button class="icon-circle btn-yellow">🔔</button>
            <button class="icon-circle btn-blue">☰</button>
        </div>
    </div>

    <div class="search-row">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" placeholder="Search student links">
        </div>
        <button class="btn-filter">⚙️</button>
    </div>

    <div class="hero-card">
        <div class="student-badge">👤 STUDENT</div>
        <h3>TOTAL SPENT</h3>
        <div class="main-value">GHC 0.00</div>

        <div class="card-footer">
            <div class="live-info">
                <div class="live-tag">● LIVE: 10 - 5000</div><br>
                <span class="no-pass-text">(no no passenger added)</span>
            </div>
            <a href="#" class="btn-details">See Details ></a>
        </div>
    </div>

    <div class="shortcut-header">
        <span>My Shortcut</span>
        <span>→</span>
    </div>

    <div class="grid">
        <div class="grid-item">Buy Data <span class="icon">⚡</span></div>
        <div class="grid-item">Special Offer <span class="icon">🎁</span></div>
        <div class="grid-item">History <span class="icon">🕒</span></div>
        <div class="grid-item">Share and Earn <span class="icon">🔗</span></div>
    </div>
</div>

</body>
</html>
