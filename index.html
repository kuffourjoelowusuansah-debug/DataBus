<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>JoelData Store</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app-container { background: #1e1e1e; width: 100%; max-width: 400px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 20px; box-sizing: border-box; border: 2px solid #FFCC00; margin-bottom: 20px; }
        h2 { color: #FFCC00; text-align: center; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
        
        .bundle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* --- SELECT EFFECT STYLES --- */
        .bundle-card { border: 1.5px solid #333; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; background: #2a2a2a; transition: all 0.3s ease; }
        .bundle-card.selected {
            border: 3px solid #003399 !important; /* MTN Blue Border */
            background: #FFCC00 !important; /* MTN Yellow Background */
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }
        .bundle-card.selected strong, .bundle-card.selected span { color: #000 !important; }
        /* ---------------------------- */

        .bundle-card strong { display: block; font-size: 22px; color: #FFCC00; }
        .bundle-card span { font-size: 14px; color: #bbbbbb; }

        .form-section { margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; display: none; }
        .form-section.active { display: block; }
        
        .copy-box { background: #003399; color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; border: 1px solid #0055ff; }
        .copy-btn { background: #FFCC00; color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #444; border-radius: 12px; box-sizing: border-box; font-size: 18px; background: #2a2a2a; color: white; outline: none; }
        .pay-btn { width: 100%; background: #003399; color: #ffffff; border: none; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 900; text-transform: uppercase; margin-top: 10px; cursor: pointer; }

        .instruction-container { width: 100%; max-width: 400px; background: #1e1e1e; border-radius: 20px; padding: 20px; border: 1px solid #333; box-sizing: border-box; margin-bottom: 20px; }
        .instruction-container h3 { color: #FFCC00; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .instruction-container ol { padding-left: 20px; color: #bbbbbb; margin-bottom: 0; }
        .instruction-container li { margin-bottom: 12px; line-height: 1.4; }
        
        .channel-btn { width: 100%; max-width: 400px; background: #25D366; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        .channel-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="app-container">
    <h2>JoelData Store</h2>
    <div class="bundle-grid" id="bundleContainer"></div>
    
    <div class="form-section" id="orderForm">
        <h3 id="selectedPlanTitle" style="text-align:center; color:#FFCC00;">Confirm Order</h3>
        <div class="copy-box">
            <p style="margin:0; font-size: 13px;">MTN Number to Pay:</p>
            <strong style="font-size: 20px; letter-spacing: 1px;">0248745662</strong><br>
            <button class="copy-btn" onclick="copyMyNumber()">Copy Number</button>
        </div>
        <input type="tel" id="recipientPhone" placeholder="Data Recipient Number" maxlength="10">
        <button class="pay-btn" onclick="handlePayment()">Pay & Confirm</button>
    </div>
</div>

<div class="instruction-container">
    <h3>📝 How to Buy</h3>
    <ol>
        <li>Select your <b>Bundle</b> (it will highlight).</li>
        <li>Tap <b>"Copy Number"</b> to save my MoMo details.</li>
        <li>Enter the <b>Recipient Number</b>.</li>
        <li>Tap <b>"Pay"</b> and <b>Paste</b> my number in the MoMo menu.</li>
    </ol>
</div>

<a href="https://whatsapp.com/channel/0029Vb80VO3Bfxnx4pIYb11c" class="channel-btn">
    Follow JoelData Channel 📱🛜
</a>

<script>
    const momoNumber = "0248745662"; 
    let currentOrder = { gb: 0, price: 0 };

    const container = document.getElementById('bundleContainer');
    for (let gb = 1; gb <= 10; gb++) {
        let price = (gb * 5) + 1; 
        const card = document.createElement('div');
        card.className = 'bundle-card';
        card.innerHTML = `<strong>${gb}GB</strong><span>${price} GHS</span>`;
        
        card.onclick = () => {
            // Haptic Vibration (Only works on Android/Chrome)
            if (navigator.vibrate) { navigator.vibrate(50); }

            // Visual Highlight Logic
            document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');

            currentOrder = { gb, price };
            document.getElementById('selectedPlanTitle').innerText = `Buy ${gb}GB for ${price} GHS`;
            document.getElementById('orderForm').classList.add('active');
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };
        container.appendChild(card);
    }

    function copyMyNumber() {
        if (navigator.vibrate) { navigator.vibrate(30); }
        navigator.clipboard.writeText(momoNumber);
        alert("Number Copied! Paste it when you dial *170#.");
    }

    function handlePayment() {
        const targetNumber = document.getElementById('recipientPhone').value;
        if (targetNumber.length < 10) { alert("Please enter a valid number"); return; }
        const message = `ORDER: ${currentOrder.gb}GB for ${targetNumber}. Paying now!`;
        window.location.href = `tel:*170%23`;
        setTimeout(() => {
            window.location.href = `https://wa.me/233248745662?text=${encodeURIComponent(message)}`;
        }, 5000);
    }
</script>
</body>
</html>
