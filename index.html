<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoelData | Iconic Store</title>
    <script src="https://js.paystack.co/v2/inline.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --accent: #FF3B30; 
            /* YOUR GRADIENT */
            --accent-grad: linear-gradient(135deg, #FF3B30 0%, #FF9500 100%);
            --glass: rgba(255, 255, 255, 0.05); --success: #2ecc71;
            --bundle-bg: #1a1f26; --bundle-border: #2d3748;
        }

        .light-mode {
            --bg: #f8f9fa; --card: #ffffff; --text: #121212; --glass: rgba(0, 0, 0, 0.05);
            --bundle-bg: #ffffff; --bundle-border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        #themeModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 50000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        .header { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-weight: 900; letter-spacing: -1.5px; font-size: 22px; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .app-container { background: var(--card); width: 100%; max-width: 450px; border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); padding: 25px; box-sizing: border-box; border: 1px solid var(--glass); }
        .tagline { text-align: center; font-weight: 800; font-size: 28px; margin-bottom: 20px; line-height: 1.2; }

        /* --- UPDATED FEATURES BOX (VIRTUE PANEL) WITH GRADIENT --- */
        .features-box { 
            display: flex; justify-content: space-around; 
            background: var(--accent-grad); /* GRADIENT APPLIED */
            padding: 15px; border-radius: 20px; margin-bottom: 20px; 
            color: white; /* Text color changed to white for contrast */
            box-shadow: 0 10px 20px rgba(255, 59, 48, 0.2);
        }
        .feature-item { text-align: center; }
        .feature-item h4 { margin: 0; font-size: 12px; font-weight: 800; }
        .feature-item p { margin: 2px 0 0; font-size: 10px; opacity: 0.9; }

        .updates-pill { display: flex; align-items: center; justify-content: space-between; background: #ffffff; color: #000; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: 700; margin-bottom: 25px; border: 1px solid #eee; }

        .tabs-container { display: flex; width: 100%; background: var(--glass); padding: 5px; border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--glass); }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 15px; background: none; color: var(--text); font-weight: 800; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .tab-btn span { font-size: 9px; opacity: 0.7; font-weight: 400; }
        .tab-btn.active { background: var(--accent-grad); color: #fff; }

        /* --- UPDATED DATA PLATE DESIGN WITH GRADIENT --- */
        .bundle-grid { display: flex; flex-direction: column; gap: 18px; }
        .bundle-card { 
            background: var(--accent-grad); /* GRADIENT APPLIED */
            border: none; /* Removed border for cleaner gradient look */
            border-radius: 22px;
            padding: 22px;
            display: grid;
            grid-template-columns: 1fr 100px;
            grid-template-rows: auto auto auto;
            gap: 5px;
            cursor: pointer;
            transition: transform 0.2s;
            color: white; /* Ensure all text on card is white */
            box-shadow: 0 10px 25px rgba(255, 59, 48, 0.3);
        }
        .bundle-card:active { transform: scale(0.98); }
        /* Updated selected state for visibility against gradient */
        .bundle-card.selected { border: 3px solid #FFCC00; transform: scale(1.02); } 

        .plate-net { font-size: 12px; font-weight: 800; opacity: 0.9; text-transform: uppercase; }
        /* Updated expiry pill for contrast */
        .plate-expiry { font-size: 10px; background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 8px; color: white; justify-self: end; font-weight: 700; }
        
        .plate-amt { font-size: 38px; font-weight: 900; grid-row: 2; align-self: center; margin-top: 5px; }
        /* Updated label color */
        .plate-label { font-size: 12px; color: white; opacity: 0.8; grid-row: 2; align-self: end; margin-bottom: 15px; }
        
        .plate-logo { width: 65px; height: 65px; border-radius: 15px; grid-column: 2; grid-row: 2; justify-self: end; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        /* Updated price color to white for contrast */
        .plate-price { font-size: 26px; font-weight: 800; color: white; grid-row: 3; align-self: center; }
        
        /* Updated Buy button to Black for contrast against the gradient card */
        .plate-buy-btn { 
            grid-column: 2; grid-row: 3; 
            background: #000000; /* Black button */
            color: white; border: none; 
            padding: 10px 18px; border-radius: 12px; 
            font-weight: 800; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .large-input { width: 100%; padding: 25px 15px; border-radius: 25px; border: 2px solid var(--accent); background: var(--glass); color: var(--text); font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .pay-btn { width: 100%; background: var(--accent-grad); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        #sideMenu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--card); z-index: 12000; transition: 0.4s ease; padding: 40px 20px; border-left: 1px solid var(--glass); }
        #sideMenu.active { right: 0; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 15px; background: var(--glass); display: flex; align-items: center; gap: 12px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div id="themeModal">
    <h2 style="color:var(--accent)">Welcome to JoelData</h2>
    <p>Please choose a theme to start:</p>
    <button class="pay-btn" onclick="setTheme('dark')" style="margin-bottom:15px">DARK MODE</button>
    <button class="pay-btn" onclick="setTheme('light')" style="background:#fff; color:#000;">LIGHT MODE</button>
</div>

<div class="header">
    <div class="logo">JOELDATA.</div>
    <button class="pay-btn" onclick="toggleMenu()" style="width:auto; padding:8px 15px; font-size:12px">MENU</button>
</div>

<div class="app-container">
    <div class="tagline">Stay online<br>Everytime</div>

    <div class="features-box">
        <div class="feature-item"><h4>Fast Delivery</h4><p>Instant Activation</p></div>
        <div class="feature-item"><h4>Secured</h4><p>100% Encrypted</p></div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('mtn')">MTN<span>Non-Expiry</span></button>
        <button class="tab-btn" onclick="switchTab('at')">AT<span>30 Days</span></button>
    </div>

    <div id="mtnSection" class="bundle-section active"><div class="bundle-grid" id="mtnGrid"></div></div>
    <div id="atSection" class="bundle-section" style="display:none;"><div class="bundle-grid" id="atGrid"></div></div>

    <div id="orderForm" style="display:none; margin-top:30px;">
        <input type="tel" id="recipientPhone" class="large-input" placeholder="02XXXXXXXX" maxlength="10">
        <button class="pay-btn" onclick="handlePaystackPayment()">PAY SECURELY NOW</button>
    </div>
</div>

<div id="sideMenu">
    <h3 style="color: var(--accent)">JoelData</h3>
    <div class="menu-item" onclick="toggleTheme()"><i data-lucide="refresh-cw"></i> Toggle Theme</div>
    <div class="menu-item" onclick="toggleMenu()" style="margin-top:20px; background:#ef4444; color:#fff"><i data-lucide="x"></i> Close</div>
</div>

<script>
    let currentNet = "MTN"; let selectedGB = 0; let selectedPrice = 0;
    const PAYSTACK_PUBLIC_KEY = 'pk_live_90305707d30b6282979eac837bbbc9509da579af';

    const mtnData = [{g:"1GB",p:5},{g:"2GB",p:10},{g:"5GB",p:25},{g:"10GB",p:50}];
    const atData = [{g:"1GB",p:4.5},{g:"2GB",p:9},{g:"5GB",p:20.5},{g:"10GB",p:40}];

    window.onload = () => {
        renderGrid('mtnGrid', mtnData, 'MTN', 'Non Expiry', 'https://upload.wikimedia.org/wikipedia/commons/a/af/MTN_Logo.svg');
        renderGrid('atGrid', atData, 'AT', '30 Days', 'https://i.ibb.co/L6vV8yH/at-logo.png');
        lucide.createIcons();
        if(!localStorage.getItem('theme')) document.getElementById('themeModal').style.display='flex';
    };

    function renderGrid(containerId, data, net, exp, logo) {
        const grid = document.getElementById(containerId);
        data.forEach(d => {
            const card = document.createElement('div');
            card.className = 'bundle-card';
            card.innerHTML = `
                <div class="plate-net">${net}</div>
                <div class="plate-expiry">${exp}</div>
                <div class="plate-amt">${d.g}</div>
                <div class="plate-label">Data Bundle</div>
                <img src="${logo}" class="plate-logo">
                <div class="plate-price">₵${d.p.toFixed(2)}</div>
                <button class="plate-buy-btn"><i data-lucide="shopping-cart" size="16"></i> Buy</button>
            `;
            card.onclick = () => {
                document.querySelectorAll('.bundle-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedGB = d.g; selectedPrice = d.p;
                document.getElementById('orderForm').style.display = 'block';
                window.scrollTo({ top: document.getElementById('orderForm').offsetTop, behavior: 'smooth' });
            };
            grid.appendChild(card);
        });
    }

    function switchTab(net) {
        currentNet = net.toUpperCase();
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('mtnSection').style.display = net === 'mtn' ? 'block' : 'none';
        document.getElementById('atSection').style.display = net === 'at' ? 'block' : 'none';
    }

    function handlePaystackPayment() {
        const phone = document.getElementById('recipientPhone').value;
        if(phone.length < 10) return alert("Enter valid number.");
        const paystack = new PaystackPop();
        paystack.newTransaction({
            key: PAYSTACK_PUBLIC_KEY, email: 'sales@joeldata.com',
            amount: Math.round((selectedPrice + (selectedPrice < 30 ? 0.3 : 0.9)) * 100),
            currency: 'GHS',
            onSuccess: (t) => window.location.href=`https://wa.me/233248745662?text=ORDER: ${selectedGB} ${currentNet} to ${phone}`
        });
    }

    function setTheme(m) { document.body.className = m === 'light' ? 'light-mode' : ''; document.getElementById('themeModal').style.display='none'; localStorage.setItem('theme', m); }
    function toggleTheme() { setTheme(document.body.classList.contains('light-mode') ? 'dark' : 'light'); }
    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }
</script>
</body>
</html>
