    // Close Menu Function
    function toggleMenu() { 
        document.getElementById('sideMenu').classList.toggle('active'); 
    }

    function handleAuthClick() { 
        if(auth.currentUser) {
            auth.signOut();
            toggleMenu(); // Close menu after signing out
        } else {
            showModal('login'); 
        }
    }

    function signInGoogle() {
        const p = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(p).then(() => {
            closeModal();
            toggleMenu(); // Close menu after sign in
        });
    }

    // Modal and Dashboard Logic
    async function showModal(type) {
        const body = document.getElementById('modalBody');
        document.getElementById('genericModal').style.display = 'flex';
        
        if(type === 'profile') {
            const u = auth.currentUser;
            body.innerHTML = '<h3>Syncing Data...</h3>';
            
            try {
                const snap = await db.collection('orders')
                    .where('email', '==', u.email)
                    .orderBy('timestamp', 'desc')
                    .get();
                
                let total = 0; let list = '';
                snap.forEach(d => { 
                    total += d.data().amount; 
                    list += `<div style="background:var(--glass); padding:10px; border-radius:10px; margin-bottom:10px; font-size:12px;"><b>${d.data().bundle}</b> - ₵${d.data().amount.toFixed(2)}<br><small>${d.data().date}</small></div>`; 
                });
                
                body.innerHTML = `
                    <div style="text-align:center">
                        <img src="${u.photoURL}" style="width:60px; border-radius:50%; border:2px solid var(--accent)">
                        <h2 style="margin:5px 0">${u.displayName.split(' ')[0]}'s Profile</h2>
                        <div style="background:var(--accent-grad); padding:15px; border-radius:15px; color:white; margin:15px 0">
                            <small>Total Invested</small><h1 style="margin:0">₵${total.toFixed(2)}</h1>
                        </div>
                    </div>
                    <h4 style="margin-bottom:10px">Recent Orders</h4>
                    <div style="max-height:180px; overflow-y:auto">${list || 'No orders yet.'}</div>`;
            } catch (e) {
                body.innerHTML = `<h3>Profile Error</h3><p>Make sure Cloud Firestore is enabled in your console.</p>`;
            }
        } else if(type === 'login') {
            body.innerHTML = `<h2>Sign In</h2><button class="pay-btn" onclick="signInGoogle()">GOOGLE SIGN IN</button>`;

            body.innerHTML = `<h2>Work With Us</h2><p>Message Joel to start.</p><button class="pay-btn" onclick="window.location.href='https://wa.me/233248745662'">WHATSAPP</button>`;
