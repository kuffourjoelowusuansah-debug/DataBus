<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniLink UI</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap');

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
        background-color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    /* Main App Background matching the image */
    .app-container {
        background-color: #2b526e; /* Exact deep teal/blue */
        width: 100%;
        max-width: 390px;
        height: 844px; /* Standard mobile height */
        border-radius: 40px;
        padding: 30px 20px;
        overflow-y: auto;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        position: relative;
    }

    /* --- Header Area --- */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        margin-top: 20px;
    }

    .greeting {
        color: #ffffff;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    .header-icons {
        display: flex;
        gap: 12px;
    }

    .icon-circle {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        border: none;
    }

    .bell-btn {
        background-color: #fce863; /* Yellow */
        color: #000;
    }

    .menu-btn {
        background-color: #4eb1d9; /* Light Blue */
        color: #fff;
    }

    /* --- Search Area --- */
    .search-row {
        display: flex;
        gap: 12px;
        margin-bottom: 30px;
    }

    .search-bar {
        flex: 1;
        background-color: #386282; /* Lighter blue/teal */
        border-radius: 24px;
        display: flex;
        align-items: center;
        padding: 0 16px;
    }

    .search-bar span {
        color: #8dafc8;
        font-size: 16px;
        margin-right: 10px;
    }

    .search-bar input {
        background: transparent;
        border: none;
        color: #ffffff;
        width: 100%;
        padding: 14px 0;
        font-size: 14px;
        outline: none;
        font-weight: 500;
    }

    .search-bar input::placeholder {
        color: #8dafc8;
    }

    .filter-btn {
        width: 48px;
        height: 48px;
        background-color: #fce863;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        border: none;
        font-weight: 800;
    }

    /* --- Main Yellow Card --- */
    .main-card {
        background-color: #fce863;
        border-radius: 28px;
        padding: 24px;
        margin-bottom: 30px;
    }

    /* Top pill inside card */
    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .status-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 700;
        font-size: 13px;
        color: #1a1a1a;
    }

    .status-pill .icon-box {
        background-color: #1a1a1a;
        color: #fce863;
        width: 20px;
        height: 28px;
        border-radius: 6px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 10px;
    }

    .dropdown-arrow {
        background-color: rgba(0,0,0,0.05);
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: 800;
    }

    /* Middle Big Text */
    .main-amount {
        font-size: 34px;
        font-weight: 800;
        color: #1a1a1a;
        letter-spacing: -1px;
        margin-bottom: 4px;
    }

    .sub-amount {
        font-size: 13px;
        font-weight: 700;
        color: #666;
        margin-bottom: 20px;
    }

    /* Bottom of Card */
    .card-bottom {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
    }

    .live-text {
        font-size: 12px;
        font-weight: 700;
        color: #666;
        line-height: 1.4;
    }

    .live-text strong {
        color: #1a1a1a;
        font-size: 13px;
    }

    .details-btn {
        background-color: #1a1a1a;
        color: #ffffff;
        padding: 12px 20px;
        border-radius: 24px;
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
    }

    /* --- Shortcuts Section --- */
    .shortcuts-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
    }

    .shortcuts-header h3 {
        color: #ffffff;
        font-size: 16px;
        font-weight: 700;
    }

    .shortcuts-header span {
        color: #ffffff;
        font-size: 20px;
    }

    .shortcuts-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .shortcut-btn {
        background-color: #386282;
        border-radius: 16px;
        padding: 20px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #ffffff;
        font-weight: 700;
        font-size: 13px;
    }

    .shortcut-btn .icon {
        color: #fce863;
        font-size: 16px;
    }
</style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="header">
        <div class="greeting">Hi, Joel!</div>
        <div class="header-icons">
            <button class="icon-circle bell-btn">🔔</button>
            <button class="icon-circle menu-btn">☰</button>
        </div>
    </div>

    <!-- Search Row -->
    <div class="search-row">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" placeholder="Search Country">
        </div>
        <button class="filter-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><circle cx="9" cy="9" r="2"/><circle cx="15" cy="15" r="2"/><circle cx="15" cy="9" r="2"/><circle cx="9" cy="15" r="2"/></svg>
        </button>
    </div>

    <!-- Main Yellow Card -->
    <div class="main-card">
        <div class="card-top">
            <div class="status-pill">
                <div class="icon-box">📱</div>
                STUDENT
            </div>
            <div class="dropdown-arrow">▾</div>
        </div>
        
        <div class="main-amount">GHC 0.00</div>
        <div class="sub-amount">Total Spent</div>

        <div class="card-bottom">
            <div class="live-text">
                <strong>LIVE: 10 - 5000</strong><br>
                (no no passenger added)
            </div>
            <a href="#" class="details-btn">See Details &gt;</a>
        </div>
    </div>

    <!-- Shortcuts -->
    <div class="shortcuts-header">
        <h3>My Shortcut</h3>
        <span>→</span>
    </div>
    
    <div class="shortcuts-grid">
        <div class="shortcut-btn">
            Buy Data <span class="icon">⚡</span>
        </div>
        <div class="shortcut-btn">
            Special Offer <span class="icon">🎁</span>
        </div>
        <div class="shortcut-btn">
            History <span class="icon">🕒</span>
        </div>
        <div class="shortcut-btn">
            Share and Earn <span class="icon">🔗</span>
        </div>
    </div>
</div>

</body>
</html>
