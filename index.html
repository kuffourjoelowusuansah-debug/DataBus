<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Bus | High-Speed Data Transit</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://js.paystack.co/v2/inline.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Poppins', 'sans-serif'] },
            colors: {
              brand: {
                sunGold: '#FFF9E5',   /* Lightened Universal Background */
                lime: '#94CF76',      
                tangerine: '#FF9900', 
                plum: '#6A4374',      
                plumDark: '#3D2542',  
                sienna: '#A15142',    
                
                /* Saturated Network Colors */
                mtn: '#FFC107',       
                at: '#4F46E5',        
                telecel: '#E11D48'    
              }
            }
          }
        }
      }
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #FFF9E5; color: #3D2542; min-height: 100vh;}
        
        .clickable-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 20px -5px rgba(61, 37, 66, 0.1); }
        .clickable-card:active { transform: scale(0.96); }
        
        .status-in-dark { background: rgba(255, 255, 255, 0.2); color: #FFF; border: 1px solid rgba(255,255,255,0.4); }
        .status-in-light { background: rgba(61, 37, 66, 0.1); color: #3D2542; border: 1px solid rgba(61, 37, 66, 0.3); }

        .hidden-view { display: none !important; }
        
        .checkout-receipt { background: #3D2542; color: #FFFFFF; border-radius: 2.5rem; position: relative; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(61, 37, 66, 0.25); }
        .checkout-receipt::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #FF9900; }

        .pulse-light { animation: pulse-light 2s infinite; }
        @keyframes pulse-light { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Ticket Notch Effect */
        .ticket-notch { position: relative; }
        .ticket-notch::after { content: ''; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; background: #FFF9E5; border-radius: 50%; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative">

    <div id="homeView">
        <header class="p-5 flex justify-between items-center bg-brand-sunGold/90 backdrop-blur-xl sticky top-0 z-50">
            <button onclick="handleAuthClick()" id="authBtn" class="bg-brand-plumDark text-white text-[10px] font-black px-4 py-2 rounded-xl flex items-center gap-2 tracking-widest shadow-sm hover:bg-brand-plum transition-colors">
                <i data-lucide="user" class="w-4 h-4 text-brand-mtn"></i> LOGIN
            </button>
            <div class="flex flex-col items-center">
                <svg width="40" height="25" viewBox="0 0 120 60" fill="none">
                    <path d="M10 50 H110 V30 C110 20 100 15 90 15 H75 M45 15 H15 C10 15 5 20 5 30 V45" stroke="#3D2542" stroke-width="6" stroke-linecap="round"/>
                    <path d="M50 20 C55 12 65 12 70 20" stroke="#3D2542" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="60" cy="30" r="3" fill="#3D2542"/>
                    <circle cx="25" cy="50" r="7" fill="#3D2542"/>
                    <circle cx="95" cy="50" r="7" fill="#3D2542"/>
                </svg>
                <span class="text-xs font-black italic uppercase text-brand-plumDark">Data<span class="text-brand-plum"> Bus</span></span>
            </div>
            <button class="relative bg-brand-plumDark p-2 rounded-xl shadow-sm">
                <i data-lucide="bell" class="w-5 h-5 text-brand-mtn"></i>
            </button>
        </header>

        <main class="p-6 space-y-10">
            <div id="statusCard" class="bg-brand-lime text-brand-plumDark rounded-[2.5rem] p-8 relative overflow-hidden shadow-lg">
                <div class="relative z-10">
                    <div class="flex justify-between items-center">
                        <p id="userName" class="text-xs font-black uppercase tracking-[0.2em] opacity-90">Loading...</p>
                        <span class="text-[9px] font-black px-3 py-1 bg-brand-plumDark/10 rounded-full border border-brand-plumDark/20">STUDENT</span>
                    </div>
                    <p class="mt-10 text-[10px] font-black uppercase tracking-widest opacity-80">Total Spent</p>
                    <div class="flex items-baseline gap-2 mt-1">
                        <span class="text-xl font-bold">GH₵</span>
                        <h1 id="totalSpent" class="text-5xl font-black tracking-tighter">0.00</h1>
                    </div>
                    <div class="flex gap-3 mt-8">
                        <button class="flex-1 bg-brand-plumDark text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] flex items-center justify-center gap-2 shadow-lg">
                            <span class="w-2 h-2 bg-brand-lime rounded-full pulse-light"></span>
                            Live: <span id="passengerCount">42</span>
                        </button>
                        <button onclick="showHistory()" class="flex-1 bg-white/30 border border-brand-plumDark/20 text-brand-plumDark py-4 rounded-2xl text-[10px] font-black uppercase tracking-wider">History</button>
                    </div>
                </div>
            </div>

            <section class="grid grid-cols-2 gap-4">
                <button onclick="showTickets()" class="clickable-card bg-brand-plum p-6 rounded-[2rem] flex flex-col items-center gap-3">
                    <div class="bg-white/20 p-4 rounded-2xl text-white"><i data-lucide="zap"></i></div>
                    <span class="text-[11px] font-black uppercase tracking-widest text-white">Buy Data</span>
                </button>
                <button class="clickable-card bg-brand-tangerine p-6 rounded-[2rem] flex flex-col items-center gap-3">
                    <div class="bg-brand-plumDark/10 p-4 rounded-2xl text-brand-plumDark"><i data-lucide="gift"></i></div>
                    <span class="text-[11px] font-black uppercase tracking-widest text-brand-plumDark">Offers</span>
                </button>
                <button onclick="showHistory()" class="clickable-card bg-brand-sienna p-6 rounded-[2rem] flex flex-col items-center gap-3">
                    <div class="bg-white/20 p-4 rounded-2xl text-white"><i data-lucide="history"></i></div>
                    <span class="text-[11px] font-black uppercase tracking-widest text-white">History</span>
                </button>
                <button class="clickable-card bg-brand-plumDark p-6 rounded-[2rem] flex flex-col items-center gap-3">
                    <div class="bg-white/10 p-4 rounded-2xl text-brand-mtn"><i data-lucide="help-circle"></i></div>
                    <span class="text-[11px] font-black uppercase tracking-widest text-white">Support</span>
                </button>
            </section>
        </main>
    </div>

    <div id="ticketsView" class="hidden-view">
        <header class="p-6 flex items-center gap-4 bg-brand-sunGold/90 backdrop-blur-md sticky top-0 z-50">
            <button onclick="showHome()" class="p-2 bg-brand-plumDark text-brand-mtn rounded-xl">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <h1 class="text-xl font-black text-brand-plumDark">Select Network</h1>
        </header>
        <main class="p-6 space-y-6">
            <div onclick="showBundles('MTN')" class="clickable-card bg-brand-mtn p-6 rounded-[2.5rem] flex items-center justify-between cursor-pointer">
                <div class="flex items-center gap-5">
                    <div class="bg-white/30 w-16 h-16 rounded-[1.5rem] flex items-center justify-center"><img src="https://upload.wikimedia.org/wikipedia/commons/a/af/MTN_Logo.svg" class="w-10 h-10"></div>
                    <h2 class="text-2xl font-black text-brand-plumDark">MTN Ghana</h2>
                </div>
                <div class="status-in-light px-4 py-2 rounded-xl text-[10px] font-black">ACTIVE</div>
            </div>
            <div onclick="showBundles('TELECEL')" class="clickable-card bg-brand-telecel p-6 rounded-[2.5rem] flex items-center justify-between cursor-pointer">
                <div class="flex items-center gap-5">
                    <div class="bg-white/20 w-16 h-16 rounded-[1.5rem] flex items-center justify-center text-white font-black text-3xl">T</div>
                    <h2 class="text-2xl font-black text-white">Telecel</h2>
                </div>
                <div class="status-in-dark px-4 py-2 rounded-xl text-[10px] font-black">ACTIVE</div>
            </div>
            <div onclick="showBundles('AT')" class="clickable-card bg-brand-at p-6 rounded-[2.5rem] flex items-center justify-between cursor-pointer">
                <div class="flex items-center gap-5">
                    <div class="bg-white/20 w-16 h-16 rounded-[1.5rem] flex items-center justify-center text-white font-black text-2xl">AT</div>
                    <h2 class="text-2xl font-black text-white">AT Ghana</h2>
                </div>
                <div class="status-in-dark px-4 py-2 rounded-xl text-[10px] font-black">ACTIVE</div>
            </div>
        </main>
    </div>

    <div id="bundlesView" class="hidden-view">
        <header class="p-6 flex items-center gap-4 bg-brand-sunGold/90 backdrop-blur-md sticky top-0 z-50">
            <button onclick="showTickets()" class="p-2 bg-brand-plumDark text-brand-mtn rounded-xl">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <h1 id="bundleTitle" class="text-xl font-black text-brand-plumDark">Bundles</h1>
        </header>
        <main class="p-6 space-y-8" id="bundleList"></main>
    </div>

    <div id="checkoutView" class="hidden-view">
        <header class="p-6 flex items-center gap-4 bg-brand-sunGold/90 backdrop-blur-md sticky top-0 z-50">
            <button onclick="showBundles(currentNet)" class="p-2 bg-brand-plumDark text-brand-mtn rounded-xl"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
            <h1 class="text-xl font-black uppercase text-brand-plumDark">Checkout</h1>
        </header>
        <main class="p-6">
            <div class="checkout-receipt p-8 space-y-6">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="checkBundle" class="text-4xl font-black text-white">0GB</h2>
                        <p id="checkNet" class="text-brand-tangerine text-[10px] font-black uppercase mt-1">Network</p>
                    </div>
                </div>
                <div class="space-y-4 pt-6 border-t border-white/10">
                    <div class="flex justify-between text-2xl font-black pt-4 border-t border-dashed border-white/20">
                        <span class="text-white text-xs">Total Payment</span>
                        <span id="checkTotal" class="text-brand-lime tracking-tight">₵ 0.00</span>
                    </div>
                </div>
                <input type="tel" id="recipientPhone" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white font-bold outline-none" placeholder="02XXXXXXXX" maxlength="10">
                <button onclick="handlePayment()" class="w-full bg-brand-tangerine text-brand-plumDark py-5 rounded-2xl font-black uppercase tracking-widest shadow-md">Confirm & Pay</button>
            </div>
        </main>
    </div>

    <div id="historyView" class="hidden-view">
        <header class="p-6 flex items-center gap-4 bg-brand-sunGold/90 backdrop-blur-md sticky top-0 z-50">
            <button onclick="showHome()" class="p-2 bg-brand-plumDark text-brand-mtn rounded-xl"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
            <h1 class="text-xl font-black text-brand-plumDark uppercase tracking-widest">History</h1>
        </header>
        <main class="p-6" id="historyList"></main>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCqg3E9tuKRcEnq2DdP6FjtG0LqnAjCHfM", authDomain: "joeldata-25d06.firebaseapp.com", projectId: "joeldata-25d06", storageBucket: "joeldata-25d06.firebasestorage.app", messagingSenderId: "555857869458", appId: "1:555857869458:web:db96a97fca5983b142044b" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentNet = "MTN"; let selG = ""; let selP = 0; let activeRef = "";
        function refreshIcons() { lucide.createIcons(); }

        const dataSets = {
            MTN: { title: "MTN Tickets", cardClass: "bg-brand-mtn text-brand-plumDark", btnClass: "bg-brand-plumDark text-white", prices: [{gb:"1 GB", price:"5"}, {gb:"5 GB", price:"25"}, {gb:"10 GB", price:"50"}] },
            AT: { title: "AT Tickets", cardClass: "bg-brand-at text-white", btnClass: "bg-brand-sunGold text-brand-plumDark", prices: [{gb:"1 GB", price:"4.5"}, {gb:"5 GB", price:"20.5"}, {gb:"10 GB", price:"40"}] },
            TELECEL: { title: "Telecel Tickets", cardClass: "bg-brand-telecel text-white", btnClass: "bg-brand-plumDark text-white", prices: [{gb:"10 GB", price:"40"}, {gb:"25 GB", price:"100"}, {gb:"50 GB", price:"200"}] }
        };

        function showHome() { hideAll(); document.getElementById('homeView').classList.remove('hidden-view'); refreshIcons(); }
        function showTickets() { hideAll(); document.getElementById('ticketsView').classList.remove('hidden-view'); refreshIcons(); }
        function showHistory() { hideAll(); document.getElementById('historyView').classList.remove('hidden-view'); renderHistory(); }
        
        function hideAll() {
            ['homeView', 'ticketsView', 'bundlesView', 'historyView', 'checkoutView'].forEach(id => document.getElementById(id).classList.add('hidden-view'));
        }

        function showBundles(network) {
            hideAll(); currentNet = network; const set = dataSets[network];
            document.getElementById('bundleTitle').innerText = set.title;
            const container = document.getElementById('bundleList'); container.innerHTML = ''; 
            set.prices.forEach(item => {
                // RESTORED DESIGN: High-contrast ticket block
                container.innerHTML += `
                <div class="${set.cardClass} rounded-[2rem] overflow-hidden shadow-xl p-8 text-center space-y-4 ticket-notch">
                    <div class="flex justify-center mb-2"><i data-lucide="wifi" class="w-6 h-6 opacity-80"></i></div>
                    <h2 class="text-6xl font-black tracking-tighter">${item.gb.split(' ')[0]} <span class="text-xl opacity-60">GB</span></h2>
                    <p class="text-[10px] font-black uppercase tracking-widest opacity-80">STAY CONNECTED • ₵ ${item.price}</p>
                    <button onclick="openCheckout('${item.gb}', ${item.price})" class="w-full ${set.btnClass} py-4 mt-4 rounded-2xl font-black uppercase shadow-lg">🛒 GET TICKET</button>
                </div>`;
            });
            document.getElementById('bundlesView').classList.remove('hidden-view'); refreshIcons(); window.scrollTo(0,0);
        }

        function openCheckout(gb, price) {
            hideAll(); selG = gb; selP = parseFloat(price);
            const total = (selP + (selP < 30 ? 0.3 : 0.9)).toFixed(2);
            document.getElementById('checkBundle').innerText = gb;
            document.getElementById('checkNet').innerText = currentNet;
            document.getElementById('checkTotal').innerText = `₵ ${total}`;
            document.getElementById('checkoutView').classList.remove('hidden-view');
            refreshIcons();
        }

        auth.onAuthStateChanged(user => {
            const nameEl = document.getElementById('userName');
            nameEl.innerText = user ? `Welcome, ${user.displayName.split(' ')[0]}` : "Welcome, Joel";
            refreshIcons();
        });

        function handleAuthClick() { if (auth.currentUser) auth.signOut(); else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        refreshIcons();
    </script>
</body>
</html>
