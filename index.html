<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>JoelData - MTN Bundles</title>
    <style>
        /* MTN Color Palette: Yellow (#FFCC00) and Dark Blue/Black (#000000) */
        body { font-family: -apple-system, sans-serif; background-color: #FFCC00; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 20px; box-sizing: border-box; border: 3px solid #000; }
        h2 { color: #000; text-align: center; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .bundle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .bundle-card { border: 2px solid #FFCC00; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; background: #fff; }
        .bundle-card:active { background: #FFCC00; color: #000; }
        .bundle-card strong { display: block; font-size: 22px; color: #000; }
        .bundle-card span { font-size: 14px; color: #555; font-weight: bold; }
        .form-section { margin-top: 30px; padding-top: 20px; border-top: 3px solid #FFCC00; display: none; }
        .form-section.active { display: block; }
        h3 { color: #000; font-size: 18px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #000; border-radius: 12px; box-sizing: border-box; font-size: 18px; outline: none; }
        .pay-btn { width: 100%; background: #000; color: #FFCC00; border: none; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .pay-btn:active { background: #333; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>JoelData Store</h2>
    <div class="bundle-grid" id="bundleContainer"></div>
    <div class="form-section" id="orderForm">
        <h3 id="selectedPlanTitle">Confirm Order</h3>
        <input type="tel" id="recipientPhone" placeholder="Recipient Number" maxlength="10">
        <button class="pay-btn" onclick="handlePayment()">Pay & Get Data</button>
    </div>
</div>

<script>
    const momoNumber = "0248745662"; 
    let currentOrder = { gb: 0, price: 0 };

    const container = document.getElementById('bundleContainer');
    for (let gb = 1; gb <= 10; gb++) {
        let price = (gb * 5) + 1; 
        const card = document.createElement('div');
        card.className = 'bundle-card';
        card.innerHTML = `<strong>${gb}GB</strong><span>${price} GHS</span>`;
        card.onclick = () => {
            currentOrder = { gb, price };
            document.getElementById('selectedPlanTitle').innerText = `Buy ${gb}GB for ${price} GHS`;
            document.getElementById('orderForm').classList.add('active');
            window.scrollTo(0, document.body.scrollHeight);
        };
        container.appendChild(card);
    }

    function handlePayment() {
        const targetNumber = document.getElementById('recipientPhone').value;
        const amount = currentOrder.price;
        if (targetNumber.length < 10) { alert("Enter a valid 10-digit number"); return; }

        const message = `ORDER:%0A---%0ABundle: ${currentOrder.gb}GB%0ARecipient: ${targetNumber}%0AApount Paid: ${amount} GHS%0A---%0AI have made the MoMo payment.`;
        const whatsappURL = `https://wa.me/233248745662?text=${message}`;
        
        // MoMo USSD Prompt for Ghana
        const momoUSSD = `tel:*170*1*1*${momoNumber}*${momoNumber}*${amount}%23`;

        alert("MTN MOMO PAYMENT:\n1. The dialer will open.\n2. Press 'Call' and enter PIN to pay.\n3. Return here to send your WhatsApp confirmation.");
        
        window.location.href = momoUSSD;

        setTimeout(() => {
            window.location.href = whatsappURL;
        }, 6000);
    }
</script>
</body>
</html>
