<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBus | Ghana's Fast Data Transit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .bus-gradient { background: linear-gradient(135deg, #facc15 0%, #eab308 100%); }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .network-btn.active { border-color: #facc15; background: rgba(250, 204, 21, 0.1); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="p-6 flex justify-between items-center max-w-4xl mx-auto">
        <div class="flex items-center gap-2">
            <div class="bus-gradient p-2 rounded-lg text-slate-900">
                <i data-lucide="bus"></i>
            </div>
            <span class="text-2xl font-800 tracking-tighter italic uppercase">Data<span class="text-yellow-400">Bus</span></span>
        </div>
        <button class="bg-slate-800 p-2 rounded-full border border-slate-700">
            <i data-lucide="user" class="w-5 h-5 text-yellow-400"></i>
        </button>
    </nav>

    <header class="text-center py-8 px-4">
        <h1 class="text-4xl font-extrabold mb-2">Where's the destination?</h1>
        <p class="text-slate-400">High-speed data delivery across all networks.</p>
    </header>

    <main class="max-w-md mx-auto px-4 space-y-6">
        
        <section class="glass-card p-5 rounded-3xl">
            <div class="flex items-center gap-2 mb-4 text-sm font-bold text-yellow-400 uppercase tracking-widest">
                <span class="bg-yellow-400 text-slate-900 w-5 h-5 flex items-center justify-center rounded-full text-[10px]">1</span>
                Select Route
            </div>
            <div class="grid grid-cols-3 gap-3">
                <button onclick="selectNetwork('MTN')" class="network-btn active flex flex-col items-center gap-2 p-4 border-2 border-transparent rounded-2xl transition-all">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/MTN_Logo.svg" class="w-10 h-10 rounded-lg">
                    <span class="text-xs font-bold">MTN</span>
                </button>
                <button onclick="selectNetwork('Telecel')" class="network-btn flex flex-col items-center gap-2 p-4 border-2 border-transparent rounded-2xl transition-all">
                    <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center font-bold italic text-white text-xs">T</div>
                    <span class="text-xs font-bold">Telecel</span>
                </button>
                <button onclick="selectNetwork('AT')" class="network-btn flex flex-col items-center gap-2 p-4 border-2 border-transparent rounded-2xl transition-all">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white text-xs">AT</div>
                    <span class="text-xs font-bold">AT</span>
                </button>
            </div>
        </section>

        <section class="glass-card p-5 rounded-3xl">
            <div class="flex items-center gap-2 mb-4 text-sm font-bold text-yellow-400 uppercase tracking-widest">
                <span class="bg-yellow-400 text-slate-900 w-5 h-5 flex items-center justify-center rounded-full text-[10px]">2</span>
                Passenger Details
            </div>
            <div class="space-y-3">
                <div class="relative">
                    <i data-lucide="phone" class="absolute left-4 top-4 w-5 h-5 text-slate-500"></i>
                    <input type="tel" placeholder="Recipient Phone Number" class="w-full bg-slate-900/50 border border-slate-700 p-4 pl-12 rounded-2xl focus:outline-none focus:border-yellow-400 transition-all">
                </div>
            </div>
        </section>

        <section>
            <div class="flex items-center gap-2 mb-4 text-sm font-bold text-yellow-400 uppercase tracking-widest">
                <span class="bg-yellow-400 text-slate-900 w-5 h-5 flex items-center justify-center rounded-full text-[10px]">3</span>
                Select Package
            </div>
            <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                <div class="min-w-[160px] glass-card p-4 rounded-2xl border-b-4 border-b-yellow-400">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">SME Data</span>
                    <h3 class="text-2xl font-black mt-1">5GB</h3>
                    <div class="text-yellow-400 font-bold mt-2">GH₵ 23.00</div>
                    <button class="w-full mt-4 bg-slate-100 text-slate-900 text-xs font-800 py-2 rounded-lg">SELECT</button>
                </div>
                <div class="min-w-[160px] glass-card p-4 rounded-2xl">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">SME Data</span>
                    <h3 class="text-2xl font-black mt-1">10GB</h3>
                    <div class="text-yellow-400 font-bold mt-2">GH₵ 45.00</div>
                    <button class="w-full mt-4 bg-slate-700 text-white text-xs font-800 py-2 rounded-lg">SELECT</button>
                </div>
            </div>
        </section>

        <button class="w-full bus-gradient text-slate-900 font-900 py-5 rounded-2xl shadow-xl shadow-yellow-500/20 flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform">
            PROCEED TO CHECKOUT <i data-lucide="arrow-right" class="w-5 h-5"></i>
        </button>

    </main>

    <script>
        lucide.createIcons();
        
        function selectNetwork(net) {
            // Add logic to highlight selected network
            console.log("Network changed to: " + net);
        }
    </script>
</body>
</html>
