<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>UniLink | Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/config.js"></script>
</head>
<body class="bg-black text-white p-8">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black italic tracking-tighter">The Leaderboard</h1>
            <p class="text-blue-500 text-[10px] font-bold uppercase tracking-widest mt-2">Rank resets every Sunday</p>
        </header>

        <div id="leaderboardList" class="space-y-4">
            <!-- JavaScript will populate this -->
        </div>
    </div>

    <script>
        async function loadLeaderboard() {
            const list = document.getElementById('leaderboardList');
            const snap = await db.collection('users').orderBy('points', 'desc').limit(10).get();
            
            list.innerHTML = '';
            let rank = 1;

            snap.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="flex items-center justify-between p-6 bg-[#111] rounded-[2rem] border border-white/5">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl font-black ${rank < 4 ? 'text-blue-500' : 'text-gray-700'}">#${rank}</span>
                            <span class="font-bold text-sm">${data.email.split('@')[0]}</span>
                        </div>
                        <span class="text-xl font-black italic">${data.points || 0} <span class="text-[10px] uppercase text-gray-500 ml-1">Pts</span></span>
                    </div>`;
                rank++;
            });
        }
        loadLeaderboard();
    </script>
</body>
</html>
